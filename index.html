<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>赛博矩阵：极限潜行</title>
    <style>
        :root {
            --bg: #0a0a14;
            --player: #00e5ff;
            --enemy: #ff1744;
            --coin: #ffea00;
            --safe: #00e676;
            --wall: #263238;
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* 彻底禁止页面滑动和缩放 */
        }

        /* 顶部状态栏 */
        .hud {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 10;
        }
        .death-count { color: var(--enemy); text-shadow: 0 0 10px var(--enemy); }
        .level-count { color: var(--player); text-shadow: 0 0 10px var(--player); }

        /* 游戏画布容器：保持比例，自适应屏幕 */
        .game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4 / 3; /* 锁定 4:3 比例 */
            background: #11111a;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.1);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* 手机端虚拟方向键 (默认隐藏，仅在触摸屏显示) */
        .dpad-container {
            display: none;
            width: 100%;
            max-width: 300px;
            margin-top: 20px;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
            padding: 10px;
        }

        .d-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px 0;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .d-btn:active { background: rgba(0, 229, 255, 0.3); border-color: var(--player); }

        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }

        /* 使用媒体查询判断是否为触摸屏设备 */
        @media (pointer: coarse) {
            .dpad-container { display: grid; }
            .game-container { aspect-ratio: auto; height: 50vh; } /* 手机上稍微压缩画布高度给手柄腾空间 */
        }

        /* 胜利界面 */
        #win-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        #win-screen h1 { color: var(--safe); font-size: 40px; margin-bottom: 10px; text-shadow: 0 0 20px var(--safe); }
        #win-screen p { margin-bottom: 20px; font-size: 18px; color: #ccc; }
        #win-screen button {
            padding: 12px 30px; font-size: 18px; font-weight: bold; background: var(--player);
            color: #000; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        #win-screen button:hover { box-shadow: 0 0 20px var(--player); transform: scale(1.05); }

    </style>
</head>
<body>

    <div class="hud">
        <div class="level-count">LEVEL: <span id="level-display">1</span>/3</div>
        <div class="death-count">DEATHS: <span id="death-display">0</span></div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="win-screen">
            <h1>SYSTEM HACKED!</h1>
            <p>你以 <span id="final-deaths" style="color:var(--enemy);font-weight:bold;">0</span> 次死亡的代价攻破了防火墙</p>
            <button onclick="restartGame()">重新挑战</button>
        </div>
    </div>

    <div class="dpad-container">
        <div class="d-btn btn-up" id="btn-up">▲</div>
        <div class="d-btn btn-left" id="btn-left">◀</div>
        <div class="d-btn btn-down" id="btn-down">▼</div>
        <div class="d-btn btn-right" id="btn-right">▶</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏核心状态
        let currentLevel = 0;
        let deaths = 0;
        let gameLoop;
        let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, a: false, s: false, d: false };

        // 基础参数
        const PLAYER_SIZE = 24;
        const PLAYER_SPEED = 4.5;
        const ENEMY_RADIUS = 10;
        const COIN_SIZE = 14;

        let player = { x: 0, y: 0, vx: 0, vy: 0 };
        let enemies = [];
        let coins = [];
        let walls = [];
        let safeZones = [];
        
        // ---------------- 关卡设计器 (硬核精华) ----------------
        // 画布大小为 800x600。
        const levelsData = [
            {
                // 第一关：初出茅庐（简单的上下交叉）
                start: { x: 50, y: 300 },
                safe: [
                    { x: 0, y: 200, w: 100, h: 200 },     // 起点安全区
                    { x: 700, y: 200, w: 100, h: 200 }    // 终点安全区
                ],
                walls: [
                    { x: 100, y: 0, w: 600, h: 200 },     // 上墙
                    { x: 100, y: 400, w: 600, h: 200 }    // 下墙
                ],
                coins: [
                    { x: 400, y: 300, collected: false }
                ],
                enemies: [
                    { x: 250, y: 210, vx: 0, vy: 6, minY: 210, maxY: 390 },
                    { x: 350, y: 390, vx: 0, vy: -6, minY: 210, maxY: 390 },
                    { x: 450, y: 210, vx: 0, vy: 6, minY: 210, maxY: 390 },
                    { x: 550, y: 390, vx: 0, vy: -6, minY: 210, maxY: 390 }
                ]
            },
            {
                // 第二关：旋转木马（风车走位）
                start: { x: 50, y: 50 },
                safe: [
                    { x: 0, y: 0, w: 100, h: 100 },
                    { x: 700, y: 500, w: 100, h: 100 }
                ],
                walls: [
                    { x: 100, y: 0, w: 600, h: 50 },
                    { x: 100, y: 550, w: 600, h: 50 },
                    { x: 300, y: 200, w: 200, h: 200 } // 中间的巨大障碍物
                ],
                coins: [
                    { x: 750, y: 50, collected: false },
                    { x: 50, y: 550, collected: false }
                ],
                enemies: [
                    // 顺时针巡逻外环
                    { x: 150, y: 100, vx: 7, vy: 0, minX: 150, maxX: 650, path: 'rect', w: 500, h: 400, dir: 1 },
                    { x: 650, y: 500, vx: -7, vy: 0, minX: 150, maxX: 650, path: 'rect', w: 500, h: 400, dir: 1 },
                    // 逆时针巡逻内环
                    { x: 250, y: 150, vx: 0, vy: 5, minX: 250, maxX: 550, path: 'rect', w: 300, h: 300, dir: -1 },
                    { x: 550, y: 450, vx: 0, vy: -5, minX: 250, maxX: 550, path: 'rect', w: 300, h: 300, dir: -1 }
                ]
            },
            {
                // 第三关：赛博死胡同（极限微操）
                start: { x: 50, y: 300 },
                safe: [
                    { x: 0, y: 250, w: 100, h: 100 },
                    { x: 700, y: 250, w: 100, h: 100 }
                ],
                walls: [
                    { x: 100, y: 0, w: 600, h: 250 },
                    { x: 100, y: 350, w: 600, h: 250 },
                    { x: 200, y: 250, w: 20, h: 70 },
                    { x: 400, y: 280, w: 20, h: 70 },
                    { x: 600, y: 250, w: 20, h: 70 }
                ],
                coins: [
                    { x: 300, y: 300, collected: false },
                    { x: 500, y: 300, collected: false }
                ],
                enemies: [
                    // 极其密集的弹幕网
                    { x: 150, y: 260, vx: 0, vy: 9, minY: 260, maxY: 340 },
                    { x: 250, y: 340, vx: 0, vy: -10, minY: 260, maxY: 340 },
                    { x: 350, y: 260, vx: 0, vy: 11, minY: 260, maxY: 340 },
                    { x: 450, y: 340, vx: 0, vy: -12, minY: 260, maxY: 340 },
                    { x: 550, y: 260, vx: 0, vy: 13, minY: 260, maxY: 340 },
                    { x: 650, y: 340, vx: 0, vy: -14, minY: 260, maxY: 340 },
                    // 横向干扰
                    { x: 100, y: 300, vx: 15, vy: 0, minX: 100, maxX: 700 }
                ]
            }
        ];

        // ---------------- 游戏引擎核心 ----------------

        function loadLevel(index) {
            if (index >= levelsData.length) {
                showWinScreen();
                return;
            }
            const data = JSON.parse(JSON.stringify(levelsData[index])); // 深拷贝防止修改原始数据
            
            player.x = data.start.x - PLAYER_SIZE/2;
            player.y = data.start.y - PLAYER_SIZE/2;
            safeZones = data.safe;
            walls = data.walls;
            coins = data.coins;
            enemies = data.enemies;
            
            document.getElementById('level-display').innerText = index + 1;
            document.getElementById('death-display').innerText = deaths;
        }

        function resetPlayer() {
            deaths++;
            document.getElementById('death-display').innerText = deaths;
            
            // 重新重置当前关卡，恢复被吃掉的金币
            loadLevel(currentLevel);
            
            // 死亡特效（画面闪红）
            canvas.style.boxShadow = "inset 0 0 100px rgba(255, 23, 68, 0.8)";
            setTimeout(() => { canvas.style.boxShadow = "none"; }, 150);
        }

        // 绘制发光矩形
        function drawGlowRect(x, y, w, h, color, blur) {
            ctx.shadowBlur = blur;
            ctx.shadowColor = color;
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
            ctx.shadowBlur = 0;
        }

        // 绘制发光圆形
        function drawGlowCircle(x, y, r, color, blur) {
            ctx.shadowBlur = blur;
            ctx.shadowColor = color;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function update() {
            // 玩家移动逻辑 (斜向移动归一化，防止斜走太快)
            let dx = 0; let dy = 0;
            if (keys.ArrowUp || keys.w) dy -= 1;
            if (keys.ArrowDown || keys.s) dy += 1;
            if (keys.ArrowLeft || keys.a) dx -= 1;
            if (keys.ArrowRight || keys.d) dx += 1;

            if (dx !== 0 && dy !== 0) {
                const length = Math.sqrt(dx*dx + dy*dy);
                dx /= length; dy /= length;
            }

            let nextX = player.x + dx * PLAYER_SPEED;
            let nextY = player.y + dy * PLAYER_SPEED;

            // 屏幕边界限制
            if(nextX < 0) nextX = 0;
            if(nextX + PLAYER_SIZE > canvas.width) nextX = canvas.width - PLAYER_SIZE;
            if(nextY < 0) nextY = 0;
            if(nextY + PLAYER_SIZE > canvas.height) nextY = canvas.height - PLAYER_SIZE;

            // 墙壁物理碰撞 (AABB - 极其严苛的滑动碰撞)
            let collidedX = false;
            let collidedY = false;
            
            for (let w of walls) {
                // 测试X轴
                if (nextX < w.x + w.w && nextX + PLAYER_SIZE > w.x && player.y < w.y + w.h && player.y + PLAYER_SIZE > w.y) {
                    collidedX = true;
                }
                // 测试Y轴
                if (player.x < w.x + w.w && player.x + PLAYER_SIZE > w.x && nextY < w.y + w.h && nextY + PLAYER_SIZE > w.y) {
                    collidedY = true;
                }
            }
            if (!collidedX) player.x = nextX;
            if (!collidedY) player.y = nextY;

            // 敌人移动逻辑
            for (let e of enemies) {
                e.x += e.vx;
                e.y += e.vy;

                // 简单的直线反弹
                if (!e.path) {
                    if (e.vx !== 0 && (e.x < e.minX || e.x > e.maxX)) e.vx *= -1;
                    if (e.vy !== 0 && (e.y < e.minY || e.y > e.maxY)) e.vy *= -1;
                } 
                // 矩形环绕轨迹 (高级敌兵)
                else if (e.path === 'rect') {
                    if (e.dir === 1) { // 顺时针
                        if (e.vx > 0 && e.x >= e.minX + e.w) { e.x = e.minX + e.w; e.vx = 0; e.vy = Math.abs(e.vx || e.vy); }
                        else if (e.vy > 0 && e.y >= e.minY + e.h) { e.y = e.minY + e.h; e.vy = 0; e.vx = -Math.abs(e.vx || e.vy); }
                        else if (e.vx < 0 && e.x <= e.minX) { e.x = e.minX; e.vx = 0; e.vy = -Math.abs(e.vx || e.vy); }
                        else if (e.vy < 0 && e.y <= e.minY) { e.y = e.minY; e.vy = 0; e.vx = Math.abs(e.vx || e.vy); }
                    } else { // 逆时针
                        if (e.vx < 0 && e.x <= e.minX) { e.x = e.minX; e.vx = 0; e.vy = Math.abs(e.vx || e.vy); }
                        else if (e.vy > 0 && e.y >= e.minY + e.h) { e.y = e.minY + e.h; e.vy = 0; e.vx = Math.abs(e.vx || e.vy); }
                        else if (e.vx > 0 && e.x >= e.minX + e.w) { e.x = e.minX + e.w; e.vx = 0; e.vy = -Math.abs(e.vx || e.vy); }
                        else if (e.vy < 0 && e.y <= e.minY) { e.y = e.minY; e.vy = 0; e.vx = -Math.abs(e.vx || e.vy); }
                    }
                }
            }

            // 死亡检测 (矩形 vs 圆形)
            let inSafeZone = false;
            for(let sz of safeZones) {
                if (player.x >= sz.x && player.x + PLAYER_SIZE <= sz.x + sz.w && 
                    player.y >= sz.y && player.y + PLAYER_SIZE <= sz.y + sz.h) {
                    inSafeZone = true;
                    break;
                }
            }

            if (!inSafeZone) {
                for (let e of enemies) {
                    let testX = e.x; let testY = e.y;
                    if (e.x < player.x) testX = player.x;
                    else if (e.x > player.x + PLAYER_SIZE) testX = player.x + PLAYER_SIZE;
                    if (e.y < player.y) testY = player.y;
                    else if (e.y > player.y + PLAYER_SIZE) testY = player.y + PLAYER_SIZE;
                    
                    let distX = e.x - testX;
                    let distY = e.y - testY;
                    let distance = Math.sqrt((distX*distX) + (distY*distY));
                    
                    // 缩小一点点碰撞体积，防止死得太冤
                    if (distance <= ENEMY_RADIUS - 2) {
                        resetPlayer();
                        return; // 立即跳出更新循环
                    }
                }
            }

            // 吃金币检测
            let allCoinsCollected = true;
            for (let c of coins) {
                if (!c.collected) {
                    // 简单的中心点碰撞
                    if (player.x < c.x + COIN_SIZE && player.x + PLAYER_SIZE > c.x - COIN_SIZE &&
                        player.y < c.y + COIN_SIZE && player.y + PLAYER_SIZE > c.y - COIN_SIZE) {
                        c.collected = true;
                    } else {
                        allCoinsCollected = false;
                    }
                }
            }

            // 过关检测：人在最后的安全区（默认数组最后一个为终点），且金币吃完
            if (allCoinsCollected) {
                let exitZone = safeZones[safeZones.length - 1];
                if (player.x >= exitZone.x && player.x + PLAYER_SIZE <= exitZone.x + exitZone.w &&
                    player.y >= exitZone.y && player.y + PLAYER_SIZE <= exitZone.y + exitZone.h) {
                    currentLevel++;
                    loadLevel(currentLevel);
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制安全区
            for (let sz of safeZones) {
                ctx.fillStyle = 'rgba(0, 230, 118, 0.15)';
                ctx.fillRect(sz.x, sz.y, sz.w, sz.h);
                ctx.strokeStyle = 'rgba(0, 230, 118, 0.5)';
                ctx.lineWidth = 2;
                ctx.strokeRect(sz.x, sz.y, sz.w, sz.h);
            }

            // 绘制墙壁
            for (let w of walls) {
                drawGlowRect(w.x, w.y, w.w, w.h, 'var(--wall)', 0);
            }

            // 绘制金币
            for (let c of coins) {
                if (!c.collected) {
                    drawGlowRect(c.x - COIN_SIZE/2, c.y - COIN_SIZE/2, COIN_SIZE, COIN_SIZE, 'var(--coin)', 15);
                }
            }

            // 绘制敌人
            for (let e of enemies) {
                drawGlowCircle(e.x, e.y, ENEMY_RADIUS, 'var(--enemy)', 15);
                // 敌兵核心白点，增加科技感
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(e.x, e.y, ENEMY_RADIUS * 0.4, 0, Math.PI*2); ctx.fill();
            }

            // 绘制玩家 (核心带光环)
            drawGlowRect(player.x, player.y, PLAYER_SIZE, PLAYER_SIZE, 'var(--player)', 20);
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x + 6, player.y + 6, PLAYER_SIZE - 12, PLAYER_SIZE - 12);
        }

        function loop() {
            update();
            draw();
            gameLoop = requestAnimationFrame(loop);
        }

        // ---------------- 界面与控制逻辑 ----------------

        function showWinScreen() {
            cancelAnimationFrame(gameLoop);
            document.getElementById('final-deaths').innerText = deaths;
            document.getElementById('win-screen').style.display = 'flex';
        }

        window.restartGame = function() {
            document.getElementById('win-screen').style.display = 'none';
            currentLevel = 0;
            deaths = 0;
            loadLevel(currentLevel);
            loop();
        }

        // 键盘监听
        window.addEventListener('keydown', e => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', e => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        // 手机虚拟按键监听 (使用 touch 避免 300ms 延迟)
        const bindDpad = (id, keyName) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', e => { e.preventDefault(); keys[keyName] = true; });
            btn.addEventListener('touchend', e => { e.preventDefault(); keys[keyName] = false; });
            btn.addEventListener('mousedown', e => { e.preventDefault(); keys[keyName] = true; });
            btn.addEventListener('mouseup', e => { e.preventDefault(); keys[keyName] = false; });
            btn.addEventListener('mouseleave', e => { keys[keyName] = false; });
        };
        bindDpad('btn-up', 'ArrowUp');
        bindDpad('btn-down', 'ArrowDown');
        bindDpad('btn-left', 'ArrowLeft');
        bindDpad('btn-right', 'ArrowRight');

        // 启动！
        loadLevel(0);
        loop();

    </script>
</body>
</html>
