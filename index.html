<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>像素大冒险 - 横版闯关</title>
    <style>
        :root {
            --sky: #87CEEB;     /* 天空蓝 */
            --ground: #4CAF50;  /* 草地绿 */
            --dirt: #795548;    /* 泥土棕 */
            --player: #F44336;  /* 主角红 */
            --enemy: #9C27B0;   /* 怪物紫 */
            --coin: #FFEB3B;    /* 金币黄 */
            --flag: #2196F3;    /* 终点蓝 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            background-color: #222;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .hud {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            font-size: 20px;
            font-weight: bold;
            background: #111;
            z-index: 10;
        }

        .game-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            /* 保持 16:9 比例 */
            aspect-ratio: 16 / 9;
            background: var(--sky);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* --- 手机端虚拟按键 --- */
        .mobile-controls {
            display: none;
            position: absolute;
            bottom: 20px;
            width: 100%;
            padding: 0 20px;
            justify-content: space-between;
            pointer-events: none; /* 让空白处不遮挡点击 */
        }

        .ctrl-group { display: flex; gap: 15px; pointer-events: auto; }

        .btn {
            width: 60px; height: 60px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            color: white; font-size: 24px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .btn:active { background: rgba(255, 255, 255, 0.6); transform: scale(0.95); }
        .btn-jump { width: 70px; height: 70px; border-radius: 16px; background: rgba(244, 67, 54, 0.4); border-color: rgba(244, 67, 54, 0.8);}
        .btn-jump:active { background: rgba(244, 67, 54, 0.7); }

        @media (pointer: coarse) {
            .mobile-controls { display: flex; }
            .game-wrapper { aspect-ratio: auto; height: 100%; max-height: 500px; }
        }

        /* 浮层界面 (胜利/死亡) */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        .overlay h1 { font-size: 40px; margin-bottom: 10px; }
        .overlay p { font-size: 18px; margin-bottom: 25px; color: #ccc; }
        .overlay button {
            padding: 12px 30px; font-size: 18px; font-weight: bold; background: #4CAF50;
            color: #fff; border: none; border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="hud">
        <div>SCORE: <span id="score">0</span></div>
        <div>LEVEL: <span id="level">1</span>/3</div>
        <div>LIVES: <span id="lives">3</span></div>
    </div>

    <div class="game-wrapper">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        
        <div class="mobile-controls">
            <div class="ctrl-group">
                <div class="btn" id="btn-left">◀</div>
                <div class="btn" id="btn-right">▶</div>
            </div>
            <div class="ctrl-group">
                <div class="btn btn-jump" id="btn-jump">UP</div>
            </div>
        </div>

        <div class="overlay" id="message-screen">
            <h1 id="msg-title">LEVEL CLEARED!</h1>
            <p id="msg-desc">准备进入下一关</p>
            <button id="msg-btn" onclick="nextAction()">继续</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏核心常量
        const GRAVITY = 0.6;
        const FRICTION = 0.8;
        const JUMP_POWER = -12;
        const MOVE_SPEED = 5;
        
        // 游戏状态
        let currentLevel = 0;
        let score = 0;
        let lives = 3;
        let gameLoop;
        let cameraX = 0;
        let isGameRunning = false;

        let keys = { left: false, right: false, up: false };

        // 主角对象
        let player = {
            x: 50, y: 50, width: 30, height: 30,
            vx: 0, vy: 0,
            isGrounded: false,
            color: 'var(--player)'
        };

        // 地图元素容器
        let platforms = [];
        let enemies = [];
        let coins = [];
        let goal = { x: 0, y: 0, width: 40, height: 150 };

        // ---------------- 关卡设计器 ----------------
        // 画布高度是 450。地面一般在 y: 400
        const levels = [
            {
                // Level 1: 纯跳跃教学，没有怪物
                width: 1500, // 地图总长度
                start: { x: 50, y: 300 },
                goal: { x: 1350, y: 250 },
                platforms: [
                    { x: 0, y: 400, w: 500, h: 50 },    // 出生点平地
                    { x: 600, y: 400, w: 300, h: 50 },  // 跨过沟壑后的平地
                    { x: 700, y: 300, w: 100, h: 20 },  // 悬空小台阶
                    { x: 1000, y: 400, w: 500, h: 50 }  // 终点平地
                ],
                enemies: [],
                coins: [
                    { x: 300, y: 350, collected: false },
                    { x: 735, y: 250, collected: false },
                    { x: 1100, y: 350, collected: false }
                ]
            },
            {
                // Level 2: 引入怪物和高低差
                width: 2000,
                start: { x: 50, y: 300 },
                goal: { x: 1850, y: 250 },
                platforms: [
                    { x: 0, y: 400, w: 600, h: 50 },
                    { x: 400, y: 300, w: 150, h: 20 },
                    { x: 750, y: 400, w: 400, h: 50 },
                    { x: 1000, y: 250, w: 100, h: 20 },
                    { x: 1300, y: 400, w: 700, h: 50 }
                ],
                enemies: [
                    // 怪物会在 minX 和 maxX 之间巡逻
                    { x: 450, y: 370, w: 30, h: 30, vx: 2, minX: 400, maxX: 550, alive: true },
                    { x: 800, y: 370, w: 30, h: 30, vx: -2, minX: 750, maxX: 1100, alive: true }
                ],
                coins: [
                    { x: 450, y: 250, collected: false },
                    { x: 1035, y: 200, collected: false }
                ]
            },
            {
                // Level 3: 连续跳跃与怪物组合
                width: 2500,
                start: { x: 50, y: 300 },
                goal: { x: 2350, y: 150 },
                platforms: [
                    { x: 0, y: 400, w: 400, h: 50 },
                    { x: 500, y: 350, w: 150, h: 20 },
                    { x: 750, y: 300, w: 150, h: 20 },
                    { x: 1000, y: 250, w: 150, h: 20 }, // 阶梯向上
                    { x: 1300, y: 400, w: 600, h: 50 },
                    { x: 1500, y: 280, w: 100, h: 20 },
                    { x: 2100, y: 400, w: 400, h: 50 },
                    { x: 2300, y: 300, w: 150, h: 100 } // 终点高台
                ],
                enemies: [
                    { x: 500, y: 320, w: 30, h: 30, vx: 1.5, minX: 500, maxX: 620, alive: true },
                    { x: 1400, y: 370, w: 30, h: 30, vx: 2.5, minX: 1300, maxX: 1850, alive: true },
                    { x: 1600, y: 370, w: 30, h: 30, vx: -2.5, minX: 1300, maxX: 1850, alive: true }
                ],
                coins: [
                    { x: 810, y: 250, collected: false },
                    { x: 1060, y: 200, collected: false },
                    { x: 1535, y: 230, collected: false }
                ]
            }
        ];

        function loadLevel(index) {
            if (index >= levels.length) {
                showScreen("YOU WIN!", "恭喜通关所有地图！最终得分: " + score, "重新开始全关卡", () => {
                    currentLevel = 0; score = 0; lives = 3; loadLevel(0);
                });
                return;
            }
            
            const levelData = JSON.parse(JSON.stringify(levels[index])); // 深拷贝
            
            player.x = levelData.start.x;
            player.y = levelData.start.y;
            player.vx = 0; player.vy = 0;
            
            platforms = levelData.platforms;
            enemies = levelData.enemies;
            coins = levelData.coins;
            goal = levelData.goal;
            goal.width = 40; goal.height = 150; // 旗杆大小

            cameraX = 0;
            
            document.getElementById('level').innerText = index + 1;
            document.getElementById('score').innerText = score;
            document.getElementById('lives').innerText = lives;
            
            isGameRunning = true;
            loop();
        }

        // ---------------- 物理引擎与逻辑更新 ----------------
        function update() {
            if (!isGameRunning) return;

            // 1. 玩家水平移动
            if (keys.left) player.vx -= 1;
            if (keys.right) player.vx += 1;
            
            player.vx *= FRICTION; // 摩擦力减速
            
            // 限制最大速度
            if (player.vx > MOVE_SPEED) player.vx = MOVE_SPEED;
            if (player.vx < -MOVE_SPEED) player.vx = -MOVE_SPEED;

            player.x += player.vx;

            // 限制玩家不能跑到地图最左边之外
            if (player.x < 0) { player.x = 0; player.vx = 0; }

            // 2. 玩家垂直移动 (重力)
            player.vy += GRAVITY;
            player.y += player.vy;

            // 3. 平台碰撞检测 (AABB)
            player.isGrounded = false;
            for (let p of platforms) {
                // 检查是否重叠
                if (player.x < p.x + p.w && player.x + player.width > p.x &&
                    player.y < p.y + p.h && player.y + player.height > p.y) {
                    
                    // 从上往下掉落碰到平台 (踩在地上)
                    if (player.vy > 0 && player.y + player.height - player.vy <= p.y + 5) {
                        player.isGrounded = true;
                        player.vy = 0;
                        player.y = p.y - player.height;
                    } 
                    // 从下往上顶到平台 (顶头)
                    else if (player.vy < 0 && player.y - player.vy >= p.y + p.h - 5) {
                        player.vy = 0;
                        player.y = p.y + p.h;
                    }
                    // 水平碰撞 (撞墙)
                    else {
                        if (player.vx > 0) player.x = p.x - player.width; // 往右撞
                        else if (player.vx < 0) player.x = p.x + p.w;     // 往左撞
                        player.vx = 0;
                    }
                }
            }

            // 4. 跳跃逻辑
            if (keys.up && player.isGrounded) {
                player.vy = JUMP_POWER;
                player.isGrounded = false;
            }

            // 5. 掉入深渊检测
            if (player.y > canvas.height + 100) {
                handleDeath();
            }

            // 6. 怪物逻辑
            for (let e of enemies) {
                if (!e.alive) continue;
                
                // 怪物巡逻
                e.x += e.vx;
                if (e.x < e.minX || e.x + e.w > e.maxX) e.vx *= -1;

                // 主角与怪物碰撞
                if (player.x < e.x + e.w && player.x + player.width > e.x &&
                    player.y < e.y + e.h && player.y + player.height > e.y) {
                    
                    // 核心机制：如果主角在下落，且脚底高于怪物中心 -> 踩死怪物
                    if (player.vy > 0 && player.y + player.height - player.vy < e.y + e.h / 2) {
                        e.alive = false;
                        player.vy = JUMP_POWER * 0.8; // 踩死后小弹跳
                        score += 50;
                        document.getElementById('score').innerText = score;
                    } else {
                        // 侧面碰到，主角死亡
                        handleDeath();
                    }
                }
            }

            // 7. 金币收集
            for (let c of coins) {
                if (!c.collected && 
                    player.x < c.x + 20 && player.x + player.width > c.x &&
                    player.y < c.y + 20 && player.y + player.height > c.y) {
                    c.collected = true;
                    score += 10;
                    document.getElementById('score').innerText = score;
                }
            }

            // 8. 终点判定
            if (player.x < goal.x + goal.width && player.x + player.width > goal.x &&
                player.y < goal.y + goal.height && player.y + player.height > goal.y) {
                isGameRunning = false;
                score += 100;
                showScreen("STAGE CLEAR!", "干得漂亮，得分: " + score, "下一关", () => {
                    currentLevel++; loadLevel(currentLevel);
                });
            }

            // 9. 镜头跟随处理 (主角跑到屏幕中右侧时滚动镜头)
            if (player.x > cameraX + canvas.width * 0.4) {
                cameraX = player.x - canvas.width * 0.4;
            }
            // 限制镜头不能往回倒退太多（可选），或者不能超出地图总长
            const currentMapWidth = levels[currentLevel].width;
            if (cameraX > currentMapWidth - canvas.width) cameraX = currentMapWidth - canvas.width;
            if (cameraX < 0) cameraX = 0;
        }

        // ---------------- 渲染与绘制 ----------------
        function draw() {
            // 清空并填充天空背景
            ctx.fillStyle = 'var(--sky)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            // 应用镜头偏移 (只偏移X轴)
            ctx.translate(-cameraX, 0);

            // 绘制终点旗杆
            ctx.fillStyle = 'var(--flag)';
            ctx.fillRect(goal.x, goal.y, goal.width, goal.height);
            ctx.fillStyle = '#fff'; // 旗帜
            ctx.beginPath(); ctx.moveTo(goal.x, goal.y); ctx.lineTo(goal.x - 40, goal.y + 20); ctx.lineTo(goal.x, goal.y + 40); ctx.fill();

            // 绘制平台 (带点草地和泥土的分层效果)
            for (let p of platforms) {
                ctx.fillStyle = 'var(--ground)';
                ctx.fillRect(p.x, p.y, p.w, Math.min(15, p.h)); // 顶部草皮
                if (p.h > 15) {
                    ctx.fillStyle = 'var(--dirt)';
                    ctx.fillRect(p.x, p.y + 15, p.w, p.h - 15); // 下面泥土
                }
            }

            // 绘制金币
            ctx.fillStyle = 'var(--coin)';
            for (let c of coins) {
                if (!c.collected) {
                    ctx.beginPath(); ctx.arc(c.x + 10, c.y + 10, 10, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.fillRect(c.x + 7, c.y + 4, 6, 12); ctx.fillStyle = 'var(--coin)'; // 金币高光
                }
            }

            // 绘制怪物
            ctx.fillStyle = 'var(--enemy)';
            for (let e of enemies) {
                if (e.alive) {
                    ctx.fillRect(e.x, e.y, e.w, e.h);
                    // 给怪物画两个眼睛
                    ctx.fillStyle = '#fff'; ctx.fillRect(e.x + 5, e.y + 5, 5, 5); ctx.fillRect(e.x + 20, e.y + 5, 5, 5); ctx.fillStyle = 'var(--enemy)';
                }
            }

            // 绘制主角
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            // 主角眼睛（看朝向）
            ctx.fillStyle = '#fff';
            if (player.vx >= 0) { ctx.fillRect(player.x + 18, player.y + 6, 6, 6); } 
            else { ctx.fillRect(player.x + 6, player.y + 6, 6, 6); }

            ctx.restore();
        }

        function loop() {
            if (!isGameRunning) return;
            update();
            draw();
            gameLoop = requestAnimationFrame(loop);
        }

        // ---------------- 系统机制 ----------------
        function handleDeath() {
            isGameRunning = false;
            lives--;
            document.getElementById('lives').innerText = lives;
            
            if (lives <= 0) {
                showScreen("GAME OVER", "你的生命值耗尽了...", "重新开始", () => {
                    currentLevel = 0; score = 0; lives = 3; loadLevel(0);
                });
            } else {
                showScreen("YOU DIED", "小心点！还剩 " + lives + " 条命", "复活", () => {
                    loadLevel(currentLevel); // 重新加载当前关卡
                });
            }
        }

        let nextActionCb = null;
        function showScreen(title, desc, btnText, callback) {
            cancelAnimationFrame(gameLoop);
            document.getElementById('msg-title').innerText = title;
            document.getElementById('msg-desc').innerText = desc;
            document.getElementById('msg-btn').innerText = btnText;
            document.getElementById('message-screen').style.display = 'flex';
            nextActionCb = callback;
        }

        window.nextAction = function() {
            document.getElementById('message-screen').style.display = 'none';
            if(nextActionCb) nextActionCb();
        }

        // ---------------- 控制绑定 ----------------
        // PC 键盘
        window.addEventListener('keydown', e => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.up = true;
        });
        window.addEventListener('keyup', e => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
            if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.up = false;
        });

        // 手机触摸
        const bindTouch = (id, keyName) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', e => { e.preventDefault(); keys[keyName] = true; });
            btn.addEventListener('touchend', e => { e.preventDefault(); keys[keyName] = false; });
            btn.addEventListener('mousedown', e => { keys[keyName] = true; }); // 兼容PC鼠标点击测试
            btn.addEventListener('mouseup', e => { keys[keyName] = false; });
            btn.addEventListener('mouseleave', e => { keys[keyName] = false; });
        };
        bindTouch('btn-left', 'left');
        bindTouch('btn-right', 'right');
        bindTouch('btn-jump', 'up');

        // 启动第一关！
        loadLevel(0);

    </script>
</body>
</html>
