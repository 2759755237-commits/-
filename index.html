<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Personal Intelligent Dashboard</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: rgba(255, 255, 255, 0.1);
            --accent: #0a84ff;
            --text: #ffffff;
            --sub-text: #8e8e93;
        }

        body {
            margin: 0; padding: 15px;
            background: radial-gradient(circle at top, #2c3e50, #000000);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .label { font-size: 11px; font-weight: 700; color: var(--sub-text); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

        /* 时间显示 */
        .time-card { text-align: center; background: none; border: none; padding: 10px 0; }
        #time { font-size: 56px; font-weight: 700; margin: 0; letter-spacing: -1px; }
        #greeting { font-size: 16px; color: var(--accent); margin-top: 5px; }

        /* 天气 */
        .weather-row { display: flex; justify-content: space-between; align-items: center; }
        .temp { font-size: 40px; font-weight: 300; }
        .city { font-size: 18px; font-weight: 600; display: block; }

        /* 新闻 */
        .news-item { 
            display: flex; gap: 12px; padding: 12px; text-decoration: none; 
            color: var(--text); border-radius: 12px; background: rgba(255, 255, 255, 0.05); margin-bottom: 8px; font-size: 14px;
        }
        .rank { color: var(--accent); font-weight: bold; }

        /* 运势 */
        .luck-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
        .badge { padding: 3px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; color: white; }
        .yi { background: #32d74b; } .ji { background: #ff453a; }
    </style>
</head>
<body>

<div class="container">
    <div class="card time-card">
        <p id="time">00:00:00</p>
        <p id="greeting">Loading...</p>
    </div>

    <div class="card">
        <div class="label">🌤️ Weather</div>
        <div class="weather-row">
            <div>
                <span class="city" id="city">定位中...</span>
                <span id="weather-status" style="font-size: 14px; color: var(--sub-text);">获取数据中</span>
            </div>
            <div class="temp" id="temp-val">--°</div>
        </div>
    </div>

    <div class="card">
        <div class="label">📅 Daily Fortune</div>
        <div class="luck-row"><span class="badge yi">宜</span> <span id="yi-text">加载中</span></div>
        <div class="luck-row"><span class="badge ji">忌</span> <span id="ji-text">加载中</span></div>
        <div id="luck-desc" style="font-size: 13px; color: var(--sub-text); margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;"></div>
    </div>

    <div class="card">
        <div class="label">🔥 Hot Topics</div>
        <div id="news-list"><div style="text-align:center; padding: 20px; color: #666; font-size: 12px;">正在连接多个资讯节点...</div></div>
    </div>
</div>

<script>
    const AMAP_KEY = '63d3f957d54929e51fd068d4ac3fa0db';

    function updateClock() {
        const now = new Date();
        document.getElementById('time').innerText = now.toTimeString().split(' ')[0];
        document.getElementById('greeting').innerText = now.toLocaleDateString('zh-CN', {month:'short', day:'numeric', weekday:'short'}) + ' · 晚安';
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 解决天气不显示的补丁
    async function initWeather() {
        try {
            const ipRes = await fetch(`https://restapi.amap.com/v3/ip?key=${AMAP_KEY}`);
            const ipData = await ipRes.json();
            if(ipData.city) {
                document.getElementById('city').innerText = ipData.city;
                const wRes = await fetch(`https://restapi.amap.com/v3/weather/weatherInfo?key=${AMAP_KEY}&city=${ipData.adcode}`);
                const wData = await wRes.json();
                if(wData.lives[0]) {
                    document.getElementById('temp-val').innerText = wData.lives[0].temperature + '°';
                    document.getElementById('weather-status').innerText = wData.lives[0].weather;
                }
            }
        } catch (e) { document.getElementById('city').innerText = "接口刷新中..."; }
    }
    setTimeout(initWeather, 500); // 延迟半秒加载，确保稳定

    function initLuck() {
        const d = new Date().getDate();
        const yis = ["代码重构", "户外运动", "整理房间", "阅读", "早睡"];
        const jis = ["拖延症", "熬夜", "情绪化", "犹豫", "乱花钱"];
        document.getElementById('yi-text').innerText = yis[d % 5];
        document.getElementById('ji-text').innerText = jis[d % 5];
        document.getElementById('luck-desc').innerText = "建议：保持心情愉悦，适合专注处理手头任务。";
    }
    initLuck();

    // 多源新闻容错逻辑
    async function fetchNews() {
        const list = document.getElementById('news-list');
        // 尝试三个不同的 API 源
        const apis = [
            'https://api.vvhan.com/api/hotlist/zhiHu',
            'https://api.vvhan.com/api/hotlist/wbHot',
            'https://api.vvhan.com/api/hotlist/baiduHot'
        ];

        for (let api of apis) {
            try {
                const res = await fetch(api, { timeout: 5000 });
                const data = await res.json();
                if(data.success && data.data.length > 0) {
                    list.innerHTML = '';
                    data.data.slice(0, 8).forEach((item, index) => {
                        const a = document.createElement('a');
                        a.className = 'news-item';
                        a.href = item.url;
                        a.target = '_blank';
                        a.innerHTML = `<span class="rank">${index+1}</span><span>${item.title}</span>`;
                        list.appendChild(a);
                    });
                    return; // 成功则跳出循环
                }
            } catch (e) { console.log("源失败，切换下一个..."); }
        }
        list.innerHTML = "<div style='text-align:center;font-size:12px;color:#666;'>所有资讯通道繁忙，请稍后刷新。</div>";
    }
    fetchNews();
</script>
</body>
</html>
