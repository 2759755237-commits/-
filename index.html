<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>海克斯飞鸟 - 豪华商店版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            background-color: #0f172a; 
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; 
        }

        #game-container {
            position: relative; width: 100%; max-width: 420px; height: 100%; max-height: 750px;
            background-color: #70c5ce; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            overflow: hidden; cursor: pointer;
        }

        canvas { display: block; width: 100%; height: 100%; }

        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10;
        }

        /* 顶部栏 */
        .top-bar {
            position: absolute; top: 15px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; z-index: 20;
            pointer-events: none;
        }
        .coin-display {
            background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px;
            color: #fce78b; font-weight: bold; font-size: 16px; border: 1px solid #c5a059;
        }
        .shop-btn {
            background: #f26d21; border: 2px solid #fff; border-radius: 20px; padding: 5px 15px;
            color: white; font-weight: bold; cursor: pointer; pointer-events: auto; box-shadow: 0 2px 0 #cf5511;
        }
        .shop-btn:active { transform: translateY(2px); box-shadow: none; }

        .score-board {
            position: absolute; top: 15%; width: 100%; text-align: center;
            font-size: 50px; font-weight: 900; color: #fff;
            -webkit-text-stroke: 2px #543847; text-shadow: 2px 2px 0 #543847, 0 4px 10px rgba(0,0,0,0.3);
            z-index: 5; pointer-events: none;
        }

        /* 面板通用样式 */
        .panel {
            background: #ded895; border: 3px solid #543847; border-radius: 12px;
            padding: 20px; text-align: center; box-shadow: 0 8px 0 rgba(0,0,0,0.2);
            pointer-events: auto; width: 85%; max-width: 320px;
        }
        .panel-title { color: #f26d21; font-size: 26px; font-weight: 900; -webkit-text-stroke: 1px #fff; margin-bottom: 15px; }
        
        /* 商店界面 */
        #shop-screen { background: rgba(0,0,0,0.8); display: none; }
        .skin-item {
            background: #ceb572; border: 2px solid #a98547; border-radius: 8px; padding: 10px;
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .skin-item.active { border-color: #f26d21; background: #e8d08c; box-shadow: 0 0 10px #f26d21; }
        .skin-name { font-weight: bold; color: #543847; }
        .skin-btn { padding: 5px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-buy { background: #10b981; color: white; }
        .btn-equip { background: #3b82f6; color: white; }
        .btn-equipped { background: #94a3b8; color: white; }
        .close-btn { background: #ef4444; color: white; padding: 8px 20px; border:none; border-radius: 20px; font-weight:bold; margin-top: 10px; cursor:pointer;}

        /* 结算界面 & 排行榜 */
        #game-over-screen { background: rgba(0,0,0,0.5); display: none; }
        .score-box { background: #ceb572; border-radius: 5px; padding: 10px; margin-bottom: 10px; border: 2px solid #a98547;}
        .score-number { color: #fff; font-size: 32px; font-weight: 900; -webkit-text-stroke: 1px #543847; }
        .leaderboard { text-align: left; background: rgba(0,0,0,0.1); padding: 5px; border-radius: 5px; margin-bottom: 15px; font-size: 12px; color: #543847; font-weight: bold;}
        .lb-item { display: flex; justify-content: space-between; border-bottom: 1px dashed rgba(0,0,0,0.1); padding: 3px 0; }
        
        .play-btn {
            background: #f26d21; border: 2px solid #fff; color: #fff; font-size: 18px; font-weight: bold;
            padding: 10px 0; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 0 #cf5511; transition: 0.1s; width: 100%;
        }
        .play-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #cf5511; }

        .ready-msg { color: #fff; font-size: 22px; font-weight: bold; -webkit-text-stroke: 1px #543847; text-align: center; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 海克斯界面 */
        #hextech-screen { background: rgba(10, 15, 30, 0.85); backdrop-filter: blur(5px); display: none; pointer-events: auto; }
        .hex-title { color: #00ffcc; font-size: 24px; font-weight: 900; margin-bottom: 15px; text-shadow: 0 0 10px rgba(0,255,204,0.5); }
        .hex-container { display: flex; flex-direction: column; gap: 12px; width: 85%; max-width: 320px; }
        .hex-card {
            background: linear-gradient(135deg, rgba(30, 40, 60, 0.9) 0%, rgba(15, 20, 35, 0.9) 100%);
            border: 2px solid #c5a059; border-radius: 12px; padding: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); color: white; cursor: pointer;
        }
        .hex-name { color: #fce78b; font-size: 16px; font-weight: bold; margin-bottom: 5px; }
        .hex-desc { color: #a0b0c0; font-size: 12px; line-height: 1.3; }

    </style>
</head>
<body>

    <div id="game-container">
        <div class="top-bar" id="top-bar">
            <div class="coin-display">🪙 <span id="coin-amount">0</span></div>
            <button class="shop-btn" id="shop-open-btn">商店</button>
        </div>

        <div class="score-board" id="current-score">0</div>
        <canvas id="gameCanvas"></canvas>

        <div class="ui-layer" id="start-screen">
            <div style="font-size: 40px; color: #fff; font-weight: 900; -webkit-text-stroke: 2px #543847; margin-bottom: 50px;">Flappy Hex</div>
            <div class="ready-msg">点击屏幕<br>选取海克斯强化</div>
        </div>

        <div class="ui-layer" id="shop-screen">
            <div class="panel">
                <div class="panel-title">皮肤商店</div>
                <div style="margin-bottom: 10px; font-weight: bold; color: #543847;">拥有金币: <span id="shop-coins" style="color:#f26d21;">0</span></div>
                <div id="skin-list"></div>
                <button class="close-btn" id="shop-close-btn">关闭商店</button>
            </div>
        </div>

        <div class="ui-layer" id="hextech-screen">
            <div class="hex-title">✦ 选取海克斯 ✦</div>
            <div class="hex-container" id="hex-container"></div>
        </div>

        <div class="ui-layer" id="game-over-screen">
            <div class="panel">
                <div class="panel-title">GAME OVER</div>
                <div class="score-box">
                    <div style="color: #543847; font-weight: bold;">SCORE</div>
                    <div class="score-number" id="final-score">0</div>
                    <div style="font-size: 12px; color: #a98547; margin-top: 5px;">+(<span id="earned-coins">0</span> 🪙)</div>
                </div>
                
                <div class="leaderboard" id="leaderboard-box">
                    </div>

                <button class="play-btn" id="restart-btn">PLAY AGAIN</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');
        
        function resize() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let myCoins = 0;
        let unlockedSkins = ['default'];
        let currentSkin = 'default';
        let scoreHistory = [];

        try {
            myCoins = parseInt(localStorage.getItem('hexCoins')) || 0;
            unlockedSkins = JSON.parse(localStorage.getItem('hexSkins')) || ['default'];
            currentSkin = localStorage.getItem('hexCurrentSkin') || 'default';
            scoreHistory = JSON.parse(localStorage.getItem('hexHistory')) || [];
        } catch(e) {}

        function saveData() {
            try {
                localStorage.setItem('hexCoins', myCoins);
                localStorage.setItem('hexSkins', JSON.stringify(unlockedSkins));
                localStorage.setItem('hexCurrentSkin', currentSkin);
                localStorage.setItem('hexHistory', JSON.stringify(scoreHistory));
            } catch(e) {}
        }

        document.getElementById('coin-amount').innerText = myCoins;

        const BASE_GRAVITY = 0.20;   
        const BASE_JUMP = -4.8;      
        const BASE_SPEED = 2.0;      
        const BASE_RADIUS = 12;
        const BASE_GAP = 160;        

        let frames = 0, score = 0, gameState = 'START'; 
        let sys = {
            gravity: BASE_GRAVITY, jumpStrength: BASE_JUMP, speed: BASE_SPEED,
            gap: BASE_GAP, scoreMult: 1, shield: 0, coinMult: 1, phoenix: false
        };

        const AUGMENTS = [
            { id: 'feather', icon: '🪶', name: '羽毛轻盈', desc: '重力降低 20%。', apply: () => sys.gravity *= 0.8 },
            { id: 'shield', icon: '🛡️', name: '钢铁之翼', desc: '获得1层护盾，免死一次并撞碎水管。', apply: () => sys.shield = 1 },
            { id: 'slow', icon: '⏳', name: '时空裂隙', desc: '水管移动速度降低 20%。', apply: () => sys.speed *= 0.8 },
            { id: 'greed', icon: '💯', name: '贪婪之手', desc: '每次穿过水管获得 2 分。', apply: () => sys.scoreMult = 2 },
            { id: 'slim', icon: '🏃', name: '迷你化', desc: '体积缩小 30%。', apply: () => bird.radius *= 0.7 },
            { id: 'wide', icon: '🛣️', name: '宽阔航道', desc: '水管间距增加 25%。', apply: () => sys.gap *= 1.25 },
            { id: 'headstart', icon: '🎁', name: '抢占先机', desc: '开局直接获得 10 分。', apply: () => { score = 10; updateScoreUI(); } },
            { id: 'invest', icon: '🤑', name: '理财大师', desc: '本局获得的海克斯金币翻倍！', apply: () => sys.coinMult = 2 },
            { id: 'risk', icon: '☠️', name: '风险投资', desc: '间距变窄10%，但每次穿过得3分。', apply: () => { sys.gap *= 0.9; sys.scoreMult = 3; } },
            { id: 'phoenix', icon: '🦅', name: '不死鸟', desc: '每获得15分，自动生成一层护盾。', apply: () => sys.phoenix = true }
        ];

        let currentChoices = [];

        function triggerHextech() {
            gameState = 'HEXTECH';
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('top-bar').style.display = 'none';
            document.getElementById('hextech-screen').style.display = 'flex';
            
            const shuffled = [...AUGMENTS].sort(() => 0.5 - Math.random());
            currentChoices = shuffled.slice(0, 3);
            
            const hexContainer = document.getElementById('hex-container');
            hexContainer.innerHTML = '';
            currentChoices.forEach((aug, index) => {
                const card = document.createElement('div');
                card.className = 'hex-card';
                card.innerHTML = `<div class="hex-name">${aug.icon} ${aug.name}</div><div class="hex-desc">${aug.desc}</div>`;
                
                const selectFn = (e) => {
                    e.stopPropagation();
                    if(e.cancelable) e.preventDefault();
                    currentChoices[index].apply();
                    document.getElementById('hextech-screen').style.display = 'none';
                    gameState = 'PLAYING';
                    bird.flap();
                };
                card.addEventListener('mousedown', selectFn);
                card.addEventListener('touchstart', selectFn, {passive: false});
                hexContainer.appendChild(card);
            });
        }

        const skins = {
            'default': { cost: 0, name: '经典小黄鸟', render: (b) => {
                ctx.fillStyle = '#f4ce42'; ctx.beginPath(); ctx.arc(0, 0, b.radius, 0, Math.PI*2); ctx.fill();
                ctx.lineWidth = 2; ctx.strokeStyle = '#543847'; ctx.stroke();
                ctx.fillStyle = '#f26d21'; ctx.beginPath(); ctx.moveTo(8, -2); ctx.lineTo(18, 2); ctx.lineTo(8, 6); ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(6, -4, 4, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(7, -4, 1.5, 0, Math.PI*2); ctx.fill();
            }},
            'ninja': { cost: 100, name: '暗影忍者', render: (b) => {
                ctx.fillStyle = '#2c3e50'; ctx.beginPath(); ctx.arc(0, 0, b.radius, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#111'; ctx.stroke();
                ctx.fillStyle = '#e74c3c'; ctx.fillRect(-b.radius, -6, b.radius*2, 4);
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(6, -2, 3, 0, Math.PI*2); ctx.fill();
            }},
            'mecha': { cost: 300, name: '源计划机甲', render: (b) => {
                ctx.fillStyle = '#95a5a6'; ctx.fillRect(-b.radius, -b.radius, b.radius*2, b.radius*2);
                ctx.strokeStyle = '#2c3e50'; ctx.strokeRect(-b.radius, -b.radius, b.radius*2, b.radius*2);
                ctx.fillStyle = '#00ffcc'; ctx.fillRect(4, -5, 6, 4);
                ctx.shadowBlur = 10; ctx.shadowColor = '#00ffcc'; ctx.fill(); ctx.shadowBlur = 0;
            }}
        };

        const bird = {
            x: 50, y: 150, radius: BASE_RADIUS, velocity: 0, rotation: 0,
            
            draw() {
                ctx.save(); ctx.translate(this.x, this.y);
                this.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (this.velocity * 0.1)));
                if(gameState === 'GAMEOVER') this.rotation = Math.PI / 2; 
                ctx.rotate(this.rotation);

                if (sys.shield > 0) {
                    ctx.beginPath(); ctx.arc(0, 0, this.radius + 6, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(0, 255, 204, 0.3)'; ctx.fill();
                    ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(0, 255, 204, 0.8)'; ctx.stroke();
                }

                skins[currentSkin].render(this);

                ctx.fillStyle = '#fff';
                let wingY = (gameState === 'PLAYING' && frames % 10 < 5) ? 2 : -2; 
                ctx.beginPath(); ctx.ellipse(-4, wingY, 6, 4, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.restore();
            },

            update() {
                this.velocity += sys.gravity; this.y += this.velocity;
                if (this.y + this.radius >= canvas.height - 100) { this.y = canvas.height - 100 - this.radius; gameOver(); }
                if (this.y - this.radius <= 0) { this.y = this.radius; this.velocity = 0; }
            },
            flap() { this.velocity = sys.jumpStrength; }
        };

        const pipes = {
            list: [], width: 50,
            draw() {
                for (let p of this.list) {
                    const drawCylinder = (x, y, w, h) => {
                        ctx.fillStyle = '#73bf2e'; ctx.fillRect(x, y, w, h);
                        ctx.fillStyle = '#9cce59'; ctx.fillRect(x + 5, y, 5, h);
                        ctx.fillStyle = '#558022'; ctx.fillRect(x + w - 10, y, 10, h);
                        ctx.lineWidth = 2; ctx.strokeStyle = '#543847'; ctx.strokeRect(x, y, w, h);
                    };
                    drawCylinder(p.x, 0, this.width, p.top);
                    drawCylinder(p.x - 2, p.top - 20, this.width + 4, 20); 
                    const bottomY = canvas.height - 100 - p.bottom;
                    drawCylinder(p.x, bottomY, this.width, p.bottom);
                    drawCylinder(p.x - 2, bottomY, this.width + 4, 20); 
                }
            },
            update() {
                if (frames % 90 === 0) {
                    let minHeight = 50; let maxPos = canvas.height - 100 - minHeight - sys.gap;
                    let topHeight = Math.max(minHeight, Math.random() * maxPos);
                    this.list.push({ x: canvas.width, top: topHeight, bottom: canvas.height - 100 - (topHeight + sys.gap), passed: false });
                }

                for (let i = 0; i < this.list.length; i++) {
                    let p = this.list[i]; p.x -= sys.speed;
                    let hitbox = { x: bird.x - bird.radius + 3, y: bird.y - bird.radius + 3, w: bird.radius*2 - 6, h: bird.radius*2 - 6 };
                    
                    if (hitbox.x + hitbox.w > p.x && hitbox.x < p.x + this.width) {
                        if (hitbox.y < p.top || hitbox.y + hitbox.h > canvas.height - 100 - p.bottom) {
                            if (sys.shield > 0) {
                                sys.shield--; this.list.splice(i, 1); i--;
                                bird.velocity = sys.jumpStrength * 0.5; continue;
                            } else { gameOver(); }
                        }
                    }

                    if (p.x + this.width < bird.x && !p.passed) {
                        score += sys.scoreMult; updateScoreUI(); p.passed = true;
                        if(sys.phoenix && score % 15 === 0) sys.shield++;
                    }
                    if (p.x + this.width < 0) { this.list.shift(); i--; }
                }
            },
            reset() { this.list = []; }
        };

        const bg = {
            groundX: 0,
            draw() {
                ctx.fillStyle = '#d0f4f7'; ctx.fillRect(0, canvas.height - 150, canvas.width, 50);
                ctx.fillStyle = '#ded895'; ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
                ctx.fillStyle = '#73bf2e'; ctx.fillRect(0, canvas.height - 100, canvas.width, 15);
                ctx.lineWidth = 2; ctx.strokeStyle = '#543847';
                ctx.beginPath(); ctx.moveTo(0, canvas.height - 100); ctx.lineTo(canvas.width, canvas.height - 100); ctx.stroke();
                ctx.strokeStyle = '#c6bc5b'; ctx.lineWidth = 3;
                for (let i = 0; i < canvas.width + 50; i += 30) {
                    ctx.beginPath(); ctx.moveTo(i + this.groundX, canvas.height - 85); ctx.lineTo(i + 20 + this.groundX, canvas.height); ctx.stroke();
                }
            },
            update() { if(gameState === 'PLAYING') this.groundX = (this.groundX - sys.speed) % 30; }
        };

        function updateScoreUI() { document.getElementById('current-score').innerText = score; }

        function gameOver() {
            if (gameState === 'GAMEOVER') return;
            gameState = 'GAMEOVER';
            
            let earned = score * sys.coinMult;
            myCoins += earned;
            document.getElementById('coin-amount').innerText = myCoins;
            document.getElementById('earned-coins').innerText = earned;

            scoreHistory.push(score);
            scoreHistory.sort((a,b) => b - a); 
            scoreHistory = scoreHistory.slice(0, 5); 
            saveData();
            
            document.getElementById('final-score').innerText = score;
            
            const lbBox = document.getElementById('leaderboard-box');
            lbBox.innerHTML = '<div style="margin-bottom:5px;">🏆 历史最高纪录</div>';
            scoreHistory.forEach((s, idx) => {
                lbBox.innerHTML += `<div class="lb-item"><span>TOP ${idx+1}</span><span>${s} 分</span></div>`;
            });

            document.getElementById('current-score').style.display = 'none';
            setTimeout(() => { document.getElementById('game-over-screen').style.display = 'flex'; }, 300); 
        }

        // --- 商店逻辑 ---
        document.getElementById('shop-open-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('shop-coins').innerText = myCoins;
            renderShop();
            document.getElementById('shop-screen').style.display = 'flex';
        });

        document.getElementById('shop-close-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('shop-screen').style.display = 'none';
        });

        function renderShop() {
            const list = document.getElementById('skin-list');
            list.innerHTML = '';
            for(let key in skins) {
                let s = skins[key];
                let isUnlocked = unlockedSkins.includes(key);
                let isEquipped = currentSkin === key;
                
                let btnHtml = '';
                if(isEquipped) {
                    btnHtml = `<button class="skin-btn btn-equipped">已装备</button>`;
                } else if(isUnlocked) {
                    btnHtml = `<button class="skin-btn btn-equip" onclick="equipSkin('${key}', event)">装备</button>`;
                } else {
                    btnHtml = `<button class="skin-btn btn-buy" onclick="buySkin('${key}', ${s.cost}, event)">${s.cost} 🪙</button>`;
                }

                list.innerHTML += `<div class="skin-item ${isEquipped ? 'active' : ''}"><span class="skin-name">${s.name}</span>${btnHtml}</div>`;
            }
        }

        window.buySkin = function(key, cost, e) {
            e.stopPropagation();
            if(myCoins >= cost) {
                myCoins -= cost; unlockedSkins.push(key);
                document.getElementById('shop-coins').innerText = myCoins;
                document.getElementById('coin-amount').innerText = myCoins;
                saveData(); renderShop();
            } else { alert("金币不足！多去飞几把赚金币吧！"); }
        };

        window.equipSkin = function(key, e) {
            e.stopPropagation(); currentSkin = key; saveData(); renderShop(); drawFrame(); 
        };

        const restartFn = (e) => {
            e.stopPropagation(); if(e.cancelable) e.preventDefault();
            
            sys = { gravity: BASE_GRAVITY, jumpStrength: BASE_JUMP, speed: BASE_SPEED, gap: BASE_GAP, scoreMult: 1, shield: 0, coinMult: 1, phoenix: false };
            bird.radius = BASE_RADIUS; bird.y = canvas.height / 2; bird.velocity = 0; bird.rotation = 0;
            pipes.reset(); score = 0; frames = 0;
            
            updateScoreUI(); document.getElementById('current-score').style.display = 'block';
            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
            document.getElementById('top-bar').style.display = 'flex';
            gameState = 'START';
        };
        document.getElementById('restart-btn').addEventListener('mousedown', restartFn);
        document.getElementById('restart-btn').addEventListener('touchstart', restartFn, {passive: false});

        function drawFrame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            bg.update(); bg.draw();
            pipes.draw(); bird.draw();
        }

        function loop() {
            drawFrame();
            if (gameState === 'PLAYING') {
                pipes.update(); bird.update(); frames++;
            } else if (gameState === 'GAMEOVER') {
                if (bird.y + bird.radius < canvas.height - 100) { bird.velocity += sys.gravity * 1.5; bird.y += bird.velocity; }
            } else if (gameState === 'START' || gameState === 'HEXTECH') {
                bird.y = (canvas.height / 2) + Math.sin(frames * 0.05) * 5; frames++;
            }
            requestAnimationFrame(loop);
        }

        // --- 核心修复：精准阻挡，确保开始点击不被吃掉 ---
        function action(e) {
            // 1. 如果点到了任何按钮、商店卡片、海克斯卡片，直接交由它们自己处理
            if (e.target && (
                e.target.tagName === 'BUTTON' || 
                (e.target.closest && e.target.closest('.panel')) || 
                (e.target.closest && e.target.closest('.hex-card'))
            )) return;

            // 2. 如果商店面板正在打开，也不允许点背景触发起飞
            if (document.getElementById('shop-screen').style.display === 'flex') return;

            if (e.type === 'keydown' && e.code !== 'Space') return;
            if (e.cancelable && (e.type === 'touchstart' || e.code === 'Space')) e.preventDefault();
            
            if (gameState === 'START') { 
                triggerHextech(); 
            } else if (gameState === 'PLAYING') { 
                bird.flap(); 
            }
        }

        window.addEventListener('keydown', action);
        container.addEventListener('mousedown', action);
        container.addEventListener('touchstart', action, { passive: false });

        bird.y = canvas.height / 2;
        loop();
    </script>
</body>
</html>
