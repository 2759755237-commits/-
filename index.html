<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飞翔的小鸟 - 精致重制版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; 
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 420px; 
            height: 100%;
            max-height: 750px;
            background-color: #70c5ce; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            cursor: pointer;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .score-board {
            position: absolute;
            top: 10%;
            width: 100%;
            text-align: center;
            font-size: 50px;
            font-weight: 900;
            color: #fff;
            -webkit-text-stroke: 2px #543847; 
            text-shadow: 2px 2px 0 #543847, 0 4px 10px rgba(0,0,0,0.3);
            z-index: 5;
            pointer-events: none;
        }

        .game-over-panel {
            background: #ded895;
            border: 3px solid #543847;
            border-radius: 10px;
            padding: 20px 30px;
            text-align: center;
            box-shadow: 0 8px 0 rgba(0,0,0,0.2);
            display: none; 
            transform: translateY(20px);
            animation: popUp 0.3s forwards;
            pointer-events: auto;
        }

        @keyframes popUp {
            to { transform: translateY(0); }
        }

        .panel-title { color: #f26d21; font-size: 28px; font-weight: 900; -webkit-text-stroke: 1px #fff; margin-bottom: 15px; }
        .score-box { background: #ceb572; border-radius: 5px; padding: 10px; margin-bottom: 15px; border: 2px solid #a98547;}
        .score-label { color: #543847; font-size: 14px; font-weight: bold; }
        .score-number { color: #fff; font-size: 32px; font-weight: 900; -webkit-text-stroke: 1px #543847; }
        
        .play-btn {
            background: #f26d21;
            border: 2px solid #fff;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 30px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 0 #cf5511;
            transition: 0.1s;
        }
        .play-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #cf5511; }

        .ready-msg {
            color: #fff; font-size: 24px; font-weight: bold;
            -webkit-text-stroke: 1px #543847;
            text-align: center;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    </style>
</head>
<body>

    <div id="game-container">
        <div class="score-board" id="current-score">0</div>
        
        <canvas id="gameCanvas"></canvas>

        <div class="ui-layer" id="start-screen">
            <div style="font-size: 40px; color: #fff; font-weight: 900; -webkit-text-stroke: 2px #543847; margin-bottom: 50px;">Flappy Bird</div>
            <div class="ready-msg">点击屏幕<br>或按空格开始</div>
        </div>

        <div class="ui-layer" id="game-over-screen" style="display: none; background: rgba(0,0,0,0.4);">
            <div class="game-over-panel" id="panel">
                <div class="panel-title">GAME OVER</div>
                <div class="score-box">
                    <div class="score-label">SCORE</div>
                    <div class="score-number" id="final-score">0</div>
                    <div class="score-label" style="margin-top: 10px;">BEST</div>
                    <div class="score-number" id="best-score">0</div>
                </div>
                <button class="play-btn" onclick="resetGame(event)" ontouchstart="resetGame(event)">PLAY AGAIN</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const currentScoreEl = document.getElementById('current-score');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const container = document.getElementById('game-container');

        let scale = 1;
        function resize() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let frames = 0;
        let score = 0;
        let bestScore = localStorage.getItem('flappyBest') || 0;
        let gameState = 'START'; 
        
        const gravity = 0.25;
        const jumpStrength = -5.5;
        const speed = 2.5;

        const bird = {
            x: 50, y: 150, radius: 12,
            velocity: 0, rotation: 0,
            wingPhase: 0,

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                this.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (this.velocity * 0.1)));
                if(gameState === 'GAMEOVER') this.rotation = Math.PI / 2; 
                ctx.rotate(this.rotation);

                ctx.fillStyle = '#f4ce42';
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI*2); ctx.fill();
                ctx.lineWidth = 2; ctx.strokeStyle = '#543847'; ctx.stroke();

                ctx.fillStyle = '#f26d21';
                ctx.beginPath();
                ctx.moveTo(8, -2); ctx.lineTo(18, 2); ctx.lineTo(8, 6); ctx.closePath();
                ctx.fill(); ctx.stroke();

                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(6, -4, 4, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(7, -4, 1.5, 0, Math.PI*2); ctx.fill();

                ctx.fillStyle = '#fff';
                let wingY = (gameState === 'PLAYING' && frames % 10 < 5) ? 2 : -2; 
                ctx.beginPath();
                ctx.ellipse(-4, wingY, 6, 4, 0, 0, Math.PI*2);
                ctx.fill(); ctx.stroke();

                ctx.restore();
            },

            update() {
                this.velocity += gravity;
                this.y += this.velocity;

                if (this.y + this.radius >= canvas.height - 100) {
                    this.y = canvas.height - 100 - this.radius;
                    gameOver();
                }
                if (this.y - this.radius <= 0) {
                    this.y = this.radius;
                    this.velocity = 0;
                }
            },

            flap() {
                this.velocity = jumpStrength;
            }
        };

        const pipes = {
            list: [],
            width: 50,
            gap: 130, 

            draw() {
                for (let p of this.list) {
                    const capHeight = 20;
                    const capOut = 4; 
                    
                    const drawCylinder = (x, y, w, h) => {
                        ctx.fillStyle = '#73bf2e'; 
                        ctx.fillRect(x, y, w, h);
                        ctx.fillStyle = '#9cce59';
                        ctx.fillRect(x + 5, y, 5, h);
                        ctx.fillStyle = '#558022';
                        ctx.fillRect(x + w - 10, y, 10, h);
                        ctx.lineWidth = 2; ctx.strokeStyle = '#543847';
                        ctx.strokeRect(x, y, w, h);
                    };

                    drawCylinder(p.x, 0, this.width, p.top);
                    drawCylinder(p.x - capOut/2, p.top - capHeight, this.width + capOut, capHeight); 
                    
                    const bottomY = canvas.height - 100 - p.bottom;
                    drawCylinder(p.x, bottomY, this.width, p.bottom);
                    drawCylinder(p.x - capOut/2, bottomY, this.width + capOut, capHeight); 
                }
            },

            update() {
                if (frames % 90 === 0) {
                    let minHeight = 50;
                    let maxPos = canvas.height - 100 - minHeight - this.gap;
                    let topHeight = Math.max(minHeight, Math.random() * maxPos);
                    
                    this.list.push({
                        x: canvas.width,
                        top: topHeight,
                        bottom: canvas.height - 100 - (topHeight + this.gap),
                        passed: false
                    });
                }

                for (let i = 0; i < this.list.length; i++) {
                    let p = this.list[i];
                    p.x -= speed;

                    let birdHitbox = { x: bird.x - bird.radius + 4, y: bird.y - bird.radius + 4, w: bird.radius*2 - 8, h: bird.radius*2 - 8 };
                    
                    if (birdHitbox.x + birdHitbox.w > p.x && birdHitbox.x < p.x + this.width) {
                        if (birdHitbox.y < p.top || birdHitbox.y + birdHitbox.h > canvas.height - 100 - p.bottom) {
                            gameOver();
                        }
                    }

                    if (p.x + this.width < bird.x && !p.passed) {
                        score++;
                        currentScoreEl.innerText = score;
                        p.passed = true;
                    }

                    if (p.x + this.width < 0) {
                        this.list.shift();
                        i--;
                    }
                }
            },
            reset() { this.list = []; }
        };

        const bg = {
            groundX: 0,
            draw() {
                ctx.fillStyle = '#d0f4f7'; 
                ctx.fillRect(0, canvas.height - 150, canvas.width, 50);
                
                ctx.fillStyle = '#ded895';
                ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
                ctx.fillStyle = '#73bf2e';
                ctx.fillRect(0, canvas.height - 100, canvas.width, 15);
                ctx.lineWidth = 2; ctx.strokeStyle = '#543847';
                ctx.beginPath(); ctx.moveTo(0, canvas.height - 100); ctx.lineTo(canvas.width, canvas.height - 100); ctx.stroke();

                ctx.strokeStyle = '#c6bc5b';
                ctx.lineWidth = 3;
                for (let i = 0; i < canvas.width + 50; i += 30) {
                    ctx.beginPath();
                    ctx.moveTo(i + this.groundX, canvas.height - 85);
                    ctx.lineTo(i + 20 + this.groundX, canvas.height);
                    ctx.stroke();
                }
            },
            update() {
                if(gameState === 'PLAYING') {
                    this.groundX = (this.groundX - speed) % 30; 
                }
            }
        };

        function gameOver() {
            if (gameState === 'GAMEOVER') return;
            gameState = 'GAMEOVER';
            
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('flappyBest', bestScore);
            }
            
            document.getElementById('final-score').innerText = score;
            document.getElementById('best-score').innerText = bestScore;
            
            currentScoreEl.style.display = 'none';
            setTimeout(() => { gameOverScreen.style.display = 'flex'; }, 300); 
        }

        // 彻底修复：点击按钮重置游戏
        function resetGame(e) {
            if(e) {
                e.stopPropagation(); 
                // 仅在手机触摸时阻止默认事件，防止在安卓上同时触发 touch 和 click 导致执行两次
                if(e.type === 'touchstart') e.preventDefault();
            }
            bird.y = canvas.height / 2;
            bird.velocity = 0;
            bird.rotation = 0;
            pipes.reset();
            score = 0;
            frames = 0;
            currentScoreEl.innerText = score;
            currentScoreEl.style.display = 'block';
            gameOverScreen.style.display = 'none';
            startScreen.style.display = 'flex';
            gameState = 'START';
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            bg.update();
            bg.draw();
            
            pipes.draw();
            bird.draw();

            if (gameState === 'PLAYING') {
                pipes.update();
                bird.update();
                frames++;
            } else if (gameState === 'GAMEOVER') {
                if (bird.y + bird.radius < canvas.height - 100) {
                    bird.velocity += gravity * 1.5;
                    bird.y += bird.velocity;
                }
            } else if (gameState === 'START') {
                bird.y = (canvas.height / 2) + Math.sin(frames * 0.05) * 5;
                frames++;
            }

            requestAnimationFrame(loop);
        }

        // --- 核心修复区：放开对按钮的点击拦截 ---
        function action(e) {
            // 如果用户点击的是 "PLAY AGAIN" 按钮，直接让浏览器去触发按钮自己的事件，游戏画面不要拦截
            if (e.target.tagName === 'BUTTON') return;

            if (e.type === 'keydown' && e.code !== 'Space') return;
            
            // 拦截背景的触摸，防止页面跟着手势上下滑
            if (e.cancelable && (e.type === 'touchstart' || e.code === 'Space')) {
                e.preventDefault();
            }
            
            if (gameState === 'START') {
                gameState = 'PLAYING';
                startScreen.style.display = 'none';
                bird.flap();
            } else if (gameState === 'PLAYING') {
                bird.flap();
            }
        }

        window.addEventListener('keydown', action);
        container.addEventListener('mousedown', action);
        container.addEventListener('touchstart', action, { passive: false });

        bird.y = canvas.height / 2;
        loop();

    </script>
</body>
</html>
