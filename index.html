<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>海克斯飞鸟</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background-color: #050811; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; touch-action: none; }
        #game-container { position: relative; width: 100%; max-width: 420px; height: 100%; max-height: 750px; background-color: #70c5ce; box-shadow: 0 0 50px rgba(0,0,0,0.9); overflow: hidden; cursor: pointer; transition: background-color 1s ease; }
        canvas { display: block; width: 100%; height: 100%; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }

        /* 顶部栏 */
        .top-bar { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 20; pointer-events: none; }
        .coin-display { background: rgba(0,0,0,0.6); padding: 6px 15px; border-radius: 20px; color: #fce78b; font-weight: bold; font-size: 16px; border: 1px solid #c5a059; backdrop-filter: blur(4px); }
        .btn-row { display: flex; gap: 8px; pointer-events: auto; }
        .top-btn { border: 2px solid #fff; border-radius: 20px; padding: 6px 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.1s; font-size: 13px;}
        .shop-btn { background: #f26d21; box-shadow: 0 3px 0 #cf5511; }
        .gacha-btn { background: #8b5cf6; box-shadow: 0 3px 0 #6d28d9; }
        .top-btn:active { transform: translateY(3px); box-shadow: none; }

        .score-board { position: absolute; top: 12%; width: 100%; text-align: center; font-size: 55px; font-weight: 900; color: #fff; -webkit-text-stroke: 2px #543847; text-shadow: 2px 2px 0 #543847, 0 4px 10px rgba(0,0,0,0.3); z-index: 5; pointer-events: none; }
        .theme-alert { position: absolute; top: 25%; width: 100%; text-align: center; font-size: 24px; font-weight: 900; color: #fff; text-shadow: 0 0 10px #fff; opacity: 0; pointer-events: none; z-index: 5; transition: opacity 0.5s; }

        /* 面板通用 */
        .panel { background: #ded895; border: 3px solid #543847; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 8px 0 rgba(0,0,0,0.2); pointer-events: auto; width: 90%; max-width: 340px; max-height: 80vh; overflow-y: auto; }
        .panel::-webkit-scrollbar { width: 0; }
        .panel-title { color: #f26d21; font-size: 26px; font-weight: 900; -webkit-text-stroke: 1px #fff; margin-bottom: 15px; text-shadow: 0 2px 4px rgba(0,0,0,0.2);}
        .close-btn { background: #ef4444; color: white; padding: 10px 30px; border:none; border-radius: 30px; font-weight:900; font-size: 16px; margin-top: 15px; cursor:pointer; width: 100%; box-shadow: 0 4px 0 #b91c1c;}
        .close-btn:active { transform: translateY(4px); box-shadow: none; }

        /* 商店与兑换码 */
        #shop-screen { background: rgba(0,0,0,0.85); display: none; }
        .shop-section-title { font-weight: 900; color: #543847; margin: 15px 0 10px; border-bottom: 2px dashed #a98547; padding-bottom: 5px;}
        .shop-item { background: #ceb572; border: 2px solid #a98547; border-radius: 8px; padding: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .shop-item.active { border-color: #f26d21; background: #e8d08c; box-shadow: 0 0 10px #f26d21; }
        .item-info { text-align: left; }
        .item-name { font-weight: bold; color: #543847; font-size: 15px;}
        .item-desc { font-size: 11px; color: #7a5a41; margin-top: 3px;}
        .shop-btn-sm { padding: 6px 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; flex-shrink: 0; margin-left: 10px;}
        .btn-buy { background: #10b981; } .btn-equip { background: #3b82f6; } .btn-equipped { background: #94a3b8; } .btn-claim { background: #eab308; box-shadow: 0 0 10px #eab308; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
        
        /* 兑换码输入框 */
        .promo-container { display: flex; gap: 8px; margin-bottom: 10px; }
        .promo-input { flex: 1; padding: 8px 12px; border-radius: 6px; border: 2px solid #a98547; background: #e8d08c; color: #543847; font-weight: bold; font-size: 14px; outline: none; }
        .promo-input::placeholder { color: #a98547; opacity: 0.8; }

        /* 抽卡 */
        #gacha-screen { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); display: none; pointer-events: auto; }
        .gacha-banner { background: linear-gradient(90deg, #8b5cf6, #3b82f6); border-radius: 10px; padding: 15px; color: white; font-weight: bold; margin-bottom: 15px; border: 2px solid #ddd; box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);}
        .gacha-btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .g-btn { flex: 1; padding: 12px 0; font-size: 16px; font-weight: bold; border: 2px solid #fff; border-radius: 8px; color: white; cursor: pointer; transition: 0.1s;}
        .g-btn-1 { background: #10b981; box-shadow: 0 4px 0 #059669;} .g-btn-10 { background: #f59e0b; box-shadow: 0 4px 0 #d97706;}
        .g-btn:active { transform: translateY(4px); box-shadow: none; }
        .gacha-result-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; max-height: 40vh; overflow-y: auto; margin-bottom: 10px;}
        .gacha-card { padding: 10px; border-radius: 8px; font-weight: bold; font-size: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #222; text-align: center; border: 2px solid #444; animation: popIn 0.3s forwards; opacity: 0; transform: scale(0.5); }
        @keyframes popIn { to { opacity: 1; transform: scale(1); } }
        .r-common { border-color: #9ca3af; color: #f3f4f6; background: linear-gradient(135deg, #4b5563, #374151); }
        .r-rare { border-color: #60a5fa; color: #bfdbfe; background: linear-gradient(135deg, #2563eb, #1d4ed8); }
        .r-epic { border-color: #c084fc; color: #e9d5ff; background: linear-gradient(135deg, #9333ea, #7e22ce); box-shadow: 0 0 10px rgba(168, 85, 247, 0.5); }
        .r-legendary { border-color: #fbbf24; color: #fef3c7; background: linear-gradient(135deg, #d97706, #b45309); box-shadow: 0 0 15px rgba(245, 158, 11, 0.8); }
        .card-icon { font-size: 24px; margin-bottom: 5px; }

        /* 结算界面 */
        #game-over-screen { background: rgba(0,0,0,0.6); display: none; }
        .score-box { background: #ceb572; border-radius: 5px; padding: 15px 10px; margin-bottom: 15px; border: 2px solid #a98547;}
        .score-number { color: #fff; font-size: 38px; font-weight: 900; -webkit-text-stroke: 1px #543847; }
        .leaderboard { text-align: left; background: rgba(0,0,0,0.1); padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 13px; color: #543847; font-weight: bold;}
        .lb-item { display: flex; justify-content: space-between; border-bottom: 1px dashed rgba(0,0,0,0.1); padding: 4px 0; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .play-btn, .home-btn { border: 2px solid #fff; color: #fff; font-size: 16px; font-weight: 900; padding: 12px 0; border-radius: 30px; cursor: pointer; transition: 0.1s; width: 100%; }
        .play-btn { background: #f26d21; box-shadow: 0 4px 0 #cf5511; }
        .play-btn:active { transform: translateY(4px); box-shadow: none; }
        .home-btn { background: #3b82f6; box-shadow: 0 4px 0 #2563eb; }
        .home-btn:active { transform: translateY(4px); box-shadow: none; }

        .ready-msg { color: #fff; font-size: 24px; font-weight: 900; -webkit-text-stroke: 1.5px #543847; text-align: center; animation: blink 1.2s infinite; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* 海克斯界面 */
        #hextech-screen { background: rgba(10, 15, 30, 0.85); backdrop-filter: blur(8px); display: none; pointer-events: auto; }
        .hex-title { color: #00ffcc; font-size: 26px; font-weight: 900; margin-bottom: 5px; text-shadow: 0 0 15px rgba(0,255,204,0.6); }
        .hex-subtitle { color: #a0b0c0; font-size: 12px; margin-bottom: 20px; }
        .hex-container { display: flex; flex-direction: column; gap: 12px; width: 90%; max-width: 320px; }
        .hex-card { background: linear-gradient(135deg, rgba(30, 40, 60, 0.95) 0%, rgba(15, 20, 35, 0.95) 100%); border: 2px solid #c5a059; border-radius: 12px; padding: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); color: white; cursor: pointer; position: relative; overflow: hidden; }
        .hex-name { color: #fce78b; font-size: 18px; font-weight: 900; margin-bottom: 6px; display: flex; align-items: center; gap: 8px;}
        .hex-desc { color: #cbd5e1; font-size: 13px; line-height: 1.4; }
        .active-items-banner { background: rgba(16, 185, 129, 0.2); border: 1px solid #10b981; color: #34d399; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 15px; }

        /* 高能警告动画 */
        .laser-warning { position: absolute; width: 100%; height: 2px; background: red; z-index: 5; box-shadow: 0 0 10px red; opacity: 0; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="top-bar" id="top-bar">
            <div class="coin-display">🪙 <span id="coin-amount">0</span></div>
            <div class="btn-row">
                <button class="top-btn shop-btn" id="shop-open-btn">🛒 商店</button>
                <button class="top-btn gacha-btn" id="gacha-open-btn">🌠 祈愿</button>
            </div>
        </div>

        <div class="score-board" id="current-score">0</div>
        <div class="theme-alert" id="theme-alert">区域解锁！</div>
        <div id="warning-line" class="laser-warning"></div>
        <canvas id="gameCanvas"></canvas>

        <div class="ui-layer" id="start-screen">
            <div style="font-size: 45px; color: #fff; font-weight: 900; -webkit-text-stroke: 2.5px #543847; margin-bottom: 60px; text-shadow: 0 5px 15px rgba(0,0,0,0.4);">Flappy V15</div>
            <div class="ready-msg">点击屏幕<br>启动进化</div>
        </div>

        <div class="ui-layer" id="gacha-screen">
            <div class="panel" style="background: #1e293b; border-color: #3b82f6;">
                <div class="panel-title" style="color: #a78bfa; -webkit-text-stroke: 1px #4c1d95;">✦ 星穹祈愿 ✦</div>
                <div class="gacha-banner">
                    <div style="font-size: 12px; color: #e2e8f0;">当前资产: <span id="gacha-coins" style="color: #fbbf24;">0</span> 🪙</div>
                    <div style="font-size: 11px; margin-top: 4px; font-weight: normal;">十连必出史诗(紫)！</div>
                </div>
                <div class="gacha-result-grid" id="gacha-results"></div>
                <div class="gacha-btn-group">
                    <button class="g-btn g-btn-1" id="btn-pull-1">单抽 100🪙</button>
                    <button class="g-btn g-btn-10" id="btn-pull-10">十连 900🪙</button>
                </div>
                <button class="close-btn" style="background:#475569; box-shadow:0 4px 0 #334155;" id="gacha-close-btn">返回主城</button>
            </div>
        </div>

        <div class="ui-layer" id="shop-screen">
            <div class="panel">
                <div class="panel-title">主城补给站</div>
                <div style="margin-bottom: 10px; font-weight: 900; color: #543847; font-size: 18px;">我的资产: <span id="shop-coins" style="color:#f26d21;">0</span> 🪙</div>
                
                <div class="shop-section-title" style="color:#3b82f6;">✦ 兑换中心 ✦</div>
                <div class="promo-container">
                    <input type="text" id="promo-code-input" class="promo-input" placeholder="输入兑换码" autocomplete="off">
                    <button class="shop-btn-sm btn-claim" style="background:#3b82f6; box-shadow:0 0 10px #3b82f6;" onclick="redeemPromoCode(event)">兑换</button>
                </div>

                <div class="shop-section-title" style="color:#eab308;">✦ 赏金任务板 ✦</div>
                <div id="quest-list"></div>

                <div class="shop-section-title">✦ 灵宠伴游 (永久生效) ✦</div>
                <div id="pet-list"></div>

                <div class="shop-section-title">✦ 局外道具 (自动消耗) ✦</div>
                <div id="items-list"></div>

                <div class="shop-section-title">✦ 专属皮肤 (自带加成) ✦</div>
                <div id="skin-list"></div>
                <button class="close-btn" id="shop-close-btn">返回主页</button>
            </div>
        </div>

        <div class="ui-layer" id="hextech-screen">
            <div class="hex-title" id="hex-title-text">✦ 初始海克斯 ✦</div>
            <div id="active-items-display" style="display:none;" class="active-items-banner"></div>
            <div class="hex-subtitle" id="hex-subtitle-text">请从下方 3 个科技中选择 1 个</div>
            <div class="hex-container" id="hex-container"></div>
        </div>

        <div class="ui-layer" id="game-over-screen">
            <div class="panel">
                <div class="panel-title">进化终结</div>
                <div class="score-box">
                    <div style="color: #543847; font-weight: 900;">最终得分</div>
                    <div class="score-number" id="final-score">0</div>
                    <div style="font-size: 14px; color: #a98547; margin-top: 8px; font-weight: bold;">收益: +<span id="earned-coins">0</span> 🪙</div>
                </div>
                <div class="leaderboard" id="leaderboard-box"></div>
                <div class="btn-group">
                    <button class="home-btn" id="home-btn">回主城</button>
                    <button class="play-btn" id="restart-btn">再次进化</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');
        
        function resize() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- 全局数据 ---
        let myCoins = 0;
        let unlockedSkins = ['default', 'white', 'red']; 
        let currentSkin = 'default';
        let unlockedPets = ['none'];
        let currentPet = 'none';
        let scoreHistory = [];
        let myItems = { shield: 0, doubleScore: 0, godWealth: 0, potion: 0, rocket: 0 }; 
        let stats = { gachaCount: 0, totalScore: 0, totalGames: 0 }; 
        let usedPromoCodes = []; // 兑换码记录记录

        let quests = [
            { id: 'q1', desc: '累计达到 150 分', target: 150, reward: 200, type: 'totalScore', claimed: false },
            { id: 'q2', desc: '累计游玩 15 局', target: 15, reward: 300, type: 'totalGames', claimed: false }
        ];

        try {
            myCoins = parseInt(localStorage.getItem('v15Coins')) || 0;
            let sSkins = JSON.parse(localStorage.getItem('v15Skins')); if(sSkins) unlockedSkins = sSkins;
            currentSkin = localStorage.getItem('v15CurrentSkin') || 'default';
            let sPets = JSON.parse(localStorage.getItem('v15Pets')); if(sPets) unlockedPets = sPets;
            currentPet = localStorage.getItem('v15CurrentPet') || 'none';
            scoreHistory = JSON.parse(localStorage.getItem('v15History')) || [];
            let sItems = JSON.parse(localStorage.getItem('v15Items')); if(sItems) myItems = Object.assign(myItems, sItems);
            let sStats = JSON.parse(localStorage.getItem('v15Stats')); if(sStats) stats = Object.assign(stats, sStats);
            let sQuests = JSON.parse(localStorage.getItem('v15Quests')); if(sQuests) quests = sQuests;
            let sCodes = JSON.parse(localStorage.getItem('v15Codes')); if(sCodes) usedPromoCodes = sCodes;
        } catch(e) {}

        function saveData() {
            try {
                localStorage.setItem('v15Coins', myCoins); localStorage.setItem('v15Skins', JSON.stringify(unlockedSkins));
                localStorage.setItem('v15CurrentSkin', currentSkin); localStorage.setItem('v15Pets', JSON.stringify(unlockedPets));
                localStorage.setItem('v15CurrentPet', currentPet); localStorage.setItem('v15History', JSON.stringify(scoreHistory));
                localStorage.setItem('v15Items', JSON.stringify(myItems)); localStorage.setItem('v15Stats', JSON.stringify(stats));
                localStorage.setItem('v15Quests', JSON.stringify(quests)); localStorage.setItem('v15Codes', JSON.stringify(usedPromoCodes));
            } catch(e) {}
        }
        document.getElementById('coin-amount').innerText = myCoins;

        // --- 兑换码中心逻辑 ---
        window.redeemPromoCode = function(e) {
            e.stopPropagation();
            const inputEl = document.getElementById('promo-code-input');
            const code = inputEl.value.trim().toUpperCase(); // 转大写处理，防止大小写错误
            
            if (!code) { alert("请输入兑换码！"); return; }
            if (usedPromoCodes.includes(code)) { alert("您已经使用过这个兑换码了！"); return; }

            if (code === '6688') {
                myCoins += 1000;
                usedPromoCodes.push(code);
                saveData();
                document.getElementById('shop-coins').innerText = myCoins;
                document.getElementById('coin-amount').innerText = myCoins;
                alert("🎉 兑换成功！获得了 1000 金币！");
                inputEl.value = '';
            } else if (code === 'FLAPPY') {
                // 隐藏彩蛋
                myCoins += 500;
                myItems.shield += 3;
                usedPromoCodes.push(code);
                saveData();
                document.getElementById('shop-coins').innerText = myCoins;
                document.getElementById('coin-amount').innerText = myCoins;
                alert("🥚 发现隐藏彩蛋！获得 500 金币 + 3个护盾！");
                inputEl.value = '';
                renderShop(); // 刷新商店道具数量显示
            } else {
                alert("无效的兑换码。");
            }
        };

        // --- 伴游宠物系统 ---
        const PETS = {
            'none': { cost: 0, name: '无', buff: '无加成', magnet: 0, render: ()=>{} },
            'fairy': { cost: 800, name: '寻宝精灵', buff: '强力金币磁吸 (120px)', magnet: 120, render: (x, y, f) => {
                ctx.fillStyle = '#00ffcc'; ctx.beginPath(); ctx.arc(x, y + Math.sin(f*0.1)*5, 6, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'rgba(0, 255, 204, 0.4)'; ctx.beginPath(); ctx.arc(x, y + Math.sin(f*0.1)*5, 12, 0, Math.PI*2); ctx.fill();
            }},
            'dragon': { cost: -1, name: '深渊骨龙(史诗)', buff: '中等磁吸 + 开局额外1层盾', magnet: 60, initShield: 1, render: (x, y, f) => {
                ctx.fillStyle = '#9333ea'; ctx.fillRect(x-6, y-4 + Math.sin(f*0.1)*5, 12, 8);
                ctx.fillStyle = '#ef4444'; ctx.fillRect(x+2, y-2 + Math.sin(f*0.1)*5, 4, 4); 
            }}
        };

        // --- 抽卡系统 ---
        const GACHA_POOL = [
            { id: 'c_50', type: 'coin', val: 50, name: '50 金币', icon: '🪙', rarity: 'common', prob: 30 },
            { id: 'i_shield', type: 'item', key: 'shield', name: '护盾发生器', icon: '🛡️', rarity: 'common', prob: 20 },
            { id: 'i_potion', type: 'item', key: 'potion', name: '缩小药水', icon: '🧪', rarity: 'common', prob: 15 },
            { id: 'i_dbl', type: 'item', key: 'doubleScore', name: '双倍积分卡', icon: '✨', rarity: 'common', prob: 10 },
            { id: 'c_150', type: 'coin', val: 150, name: '150 金币', icon: '💰', rarity: 'rare', prob: 8 },
            { id: 'i_rocket', type: 'item', key: 'rocket', name: '起步火箭', icon: '🚀', rarity: 'rare', prob: 6 },
            { id: 'i_wealth', type: 'item', key: 'godWealth', name: '财神保佑卡', icon: '💎', rarity: 'rare', prob: 4 },
            { id: 'c_500', type: 'coin', val: 500, name: '500 大金袋', icon: '📦', rarity: 'epic', prob: 4 },
            { id: 's_cyber', type: 'skin', key: 'cyber', name: '赛博黑客(皮肤)', icon: '👾', rarity: 'epic', prob: 1.5, dupComp: 500 },
            { id: 'p_dragon', type: 'pet', key: 'dragon', name: '深渊骨龙(宠物)', icon: '🐉', rarity: 'epic', prob: 1, dupComp: 600 },
            { id: 'c_2000', type: 'coin', val: 2000, name: '2000 巨款', icon: '👑', rarity: 'legendary', prob: 0.3 },
            { id: 's_god', type: 'skin', key: 'god', name: '创世神明(至臻)', icon: '☀️', rarity: 'legendary', prob: 0.2, dupComp: 2000 }
        ];

        function rollGacha(forceEpic) {
            if (forceEpic) {
                let epicPool = GACHA_POOL.filter(i => i.rarity === 'epic' || i.rarity === 'legendary');
                return epicPool[Math.floor(Math.random() * epicPool.length)];
            }
            let rand = Math.random() * 100; let sum = 0;
            for(let item of GACHA_POOL) { sum += item.prob; if(rand <= sum) return item; }
            return GACHA_POOL[0];
        }

        let isPulling = false;
        window.pullGacha = function(times, e) {
            e.stopPropagation();
            if(isPulling) return;
            let cost = times === 1 ? 100 : 900;
            if(myCoins < cost) { alert('金币不足！快去闯关赚取吧！'); return; }
            
            myCoins -= cost; isPulling = true;
            const resultsBox = document.getElementById('gacha-results'); resultsBox.innerHTML = '';
            
            for(let i=0; i<times; i++) {
                stats.gachaCount++;
                let forceEpic = (stats.gachaCount % 10 === 0);
                
                let reward = rollGacha(forceEpic);
                let isDup = false; let compCoin = 0;

                if(reward.type === 'coin') { myCoins += reward.val; }
                else if(reward.type === 'item') { myItems[reward.key]++; }
                else if(reward.type === 'skin') {

        function drawBird(b, bodyColor, beakColor) {

        const bird = {
            x: 50, y: 150, radius: BASE_RADIUS, velocity: 0, rotation: 0,
            draw() {
                ctx.save(); ctx.translate(this.x, this.y);
                this.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (this.velocity * 0.1)));
                if(gameState === 'GAMEOVER') this.rotation = Math.PI / 2; 
                ctx.rotate(this.rotation);

                if (sys.shield > 0) {
                    ctx.beginPath(); ctx.arc(0, 0, this.radius + 6, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(0, 255, 204, 0.3)'; ctx.fill();
                    ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(0, 255, 204, 0.8)'; ctx.stroke();
                }
                SKINS[currentSkin].render(this);
                ctx.fillStyle = '#fff'; let wingY = (gameState === 'PLAYING' && frames % 10 < 5) ? 2 : -2; 
                ctx.beginPath(); ctx.ellipse(-4, wingY, 6, 4, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.restore();
            },
            update() {
                this.velocity += sys.gravity; this.y += this.velocity;
                if (this.y + this.radius >= canvas.height - 100) { 
                    if (sys.bounceFloor) { sys.bounceFloor = false; this.velocity = sys.jumpStrength * 1.5; this.y = canvas.height - 100 - this.radius; } 
                    else { this.y = canvas.height - 100 - this.radius; gameOver(); }
                }
                if (this.y - this.radius <= 0) { this.y = this.radius; this.velocity = 0; }
            },
            flap() { this.velocity = sys.jumpStrength; }
        };

        const pipes = {
            list: [], width: 50, pipesPassed: 0,
            draw(theme) {
                for (let p of this.list) {
                    let currentAlpha = 1;
                    if(p.isGhost) currentAlpha = 0.3;
                    if(sys.fadingPipes) currentAlpha *= (0.3 + 0.7 * Math.abs(Math.sin(frames * 0.05 + p.id))); 
                    ctx.globalAlpha = currentAlpha;
                    
                    let yOffset = sys.movingPipes ? Math.sin(frames * 0.04 + p.id) * 40 : 0;
                    const drawCylinder = (x, y, w, h) => {
                        ctx.fillStyle = sys.goldPipes ? '#f1c40f' : theme.pipeMain; ctx.fillRect(x, y, w, h);
                        ctx.fillStyle = sys.goldPipes ? '#f9e79f' : theme.pipeLight; ctx.fillRect(x + 5, y, 5, h);
                        ctx.fillStyle = sys.goldPipes ? '#b7950b' : theme.pipeDark; ctx.fillRect(x + w - 10, y, 10, h);
                        ctx.lineWidth = 2; ctx.strokeStyle = '#543847'; ctx.strokeRect(x, y, w, h);
                    };
                    
                    let actualTop = p.top + yOffset; drawCylinder(p.x, 0, this.width, actualTop); drawCylinder(p.x - 2, actualTop - 20, this.width + 4, 20); 
                    let actualBottomHeight = canvas.height - 100 - (actualTop + sys.gap); let actualBottomY = actualTop + sys.gap;
                    drawCylinder(p.x, actualBottomY, this.width, actualBottomHeight); drawCylinder(p.x - 2, actualBottomY, this.width + 4, 20); 
                    ctx.globalAlpha = 1; 
                }
            },
            update() {
                if (frames % 90 === 0) {
                    let minHeight = 50; let maxPos = canvas.height - 100 - minHeight - sys.gap - (sys.movingPipes ? 80 : 0);
                    let topHeight = Math.max(minHeight, Math.random() * maxPos);
                    
                    if (sys.bombPipes && this.pipesPassed > 0 && this.pipesPassed % 4 === 0) {
                        this.pipesPassed++; 
                    } else {
                        this.list.push({ id: frames, x: canvas.width, top: topHeight, passed: false, isGhost: sys.ghostPipes > 0 });
                        if (Math.random() < sys.coinDropRate) { floatingCoins.push({ x: canvas.width + this.width/2, y: topHeight + sys.gap/2, collected: false }); }
                        if(sys.ghostPipes > 0) sys.ghostPipes--;
                        this.pipesPassed++;
                    }
                }

                for (let i = 0; i < this.list.length; i++) {
                    let p = this.list[i]; p.x -= sys.speed;
                    let hitbox = { x: bird.x - bird.radius + 3, y: bird.y - bird.radius + 3, w: bird.radius*2 - 6, h: bird.radius*2 - 6 };
                    
                    let yOffset = sys.movingPipes ? Math.sin(frames * 0.04 + p.id) * 40 : 0;
                    let actualTop = p.top + yOffset; let actualBottomY = actualTop + sys.gap;

                    if (!p.isGhost && hitbox.x + hitbox.w > p.x && hitbox.x < p.x + this.width) {
                        if (hitbox.y < actualTop || hitbox.y + hitbox.h > actualBottomY) {
                            if (sys.shield > 0) { sys.shield--; this.list.splice(i, 1); i--; bird.velocity = sys.jumpStrength * 0.5; continue; } 
                            else { gameOver(); }
                        }
                    }

                    if (p.x + this.width < bird.x && !p.passed) {
                        score += sys.scoreMult; updateScoreUI(); p.passed = true;
                        if(sys.phoenix) { sys.phoenixProgress += sys.scoreMult; if(sys.phoenixProgress >= 15){ sys.shield++; sys.phoenixProgress -= 15; } }
                        if(sys.scavenger) { myCoins+=5; document.getElementById('coin-amount').innerText = myCoins; }
                        checkLevelUp();
                    }
                    if (p.x + this.width < 0) { this.list.shift(); i--; }
                }

                if(score > 30 && !dynamicEvent.active && Math.random() < 0.002 && gameState === 'PLAYING') {
                    dynamicEvent.active = true; dynamicEvent.timer = 120; dynamicEvent.y = Math.random() * (canvas.height - 200) + 50;
                }
                
                let magnetRange = PETS[currentPet].magnet || 0;
                for (let i = 0; i < floatingCoins.length; i++) {
                    let c = floatingCoins[i]; 
                    if(magnetRange > 0 && !c.collected) {
                        let dist = Math.hypot(bird.x - c.x, bird.y - c.y);
                        if(dist < magnetRange + 30) { c.x += (bird.x - c.x) * 0.15; c.y += (bird.y - c.y) * 0.15; }
                    } else { c.x -= sys.speed; }
                    
                    if (!c.collected && Math.hypot(bird.x - c.x, bird.y - c.y) < bird.radius + 15) { c.collected = true; myCoins += 5; document.getElementById('coin-amount').innerText = myCoins; }
                    if (c.x < -20) { floatingCoins.shift(); i--; }
                }
            },
            reset() { this.list = []; floatingCoins = []; this.pipesPassed = 0; dynamicEvent.active = false; }
        };

        const bg = {
            groundX: 0,
            draw(theme) {
                if(!sys.hideBg) { ctx.fillStyle = theme.sky; ctx.fillRect(0, canvas.height - 150, canvas.width, 50); }
                ctx.fillStyle = theme.groundMid; ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
                ctx.fillStyle = theme.groundTop; ctx.fillRect(0, canvas.height - 100, canvas.width, 15);
                ctx.lineWidth = 2; ctx.strokeStyle = '#543847'; ctx.beginPath(); ctx.moveTo(0, canvas.height - 100); ctx.lineTo(canvas.width, canvas.height - 100); ctx.stroke();
                ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 3;
                for (let i = 0; i < canvas.width + 50; i += 30) { ctx.beginPath(); ctx.moveTo(i + this.groundX, canvas.height - 85); ctx.lineTo(i + 20 + this.groundX, canvas.height); ctx.stroke(); }
            },
            update() { if(gameState === 'PLAYING') this.groundX = (this.groundX - sys.speed) % 30; }
        };

        function drawFloatingCoins() {
            for (let c of floatingCoins) {
                if (!c.collected) {
                    ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(c.x, c.y + Math.sin(frames*0.1)*5, 10, 0, Math.PI*2); ctx.fill();
                    ctx.lineWidth = 1; ctx.strokeStyle = '#e67e22'; ctx.stroke(); ctx.fillStyle = '#fff'; ctx.fillRect(c.x - 2, c.y - 4 + Math.sin(frames*0.1)*5, 4, 8);
                }
            }
        }

        function drawDynamicEvent() {
            if(!dynamicEvent.active) { document.getElementById('warning-line').style.opacity = 0; return; }
            dynamicEvent.timer--; const wl = document.getElementById('warning-line');
            if(dynamicEvent.timer > 0) {
                wl.style.top = dynamicEvent.y + 'px'; wl.style.opacity = (frames % 10 < 5) ? 1 : 0.3; 
            } else if (dynamicEvent.timer > -20) {
                wl.style.opacity = 0;
                ctx.fillStyle = '#ff0044'; ctx.shadowBlur = 20; ctx.shadowColor = '#ff0044';
                ctx.fillRect(0, dynamicEvent.y - 12, canvas.width, 24); ctx.shadowBlur = 0;
                ctx.fillStyle = '#ffffff'; ctx.fillRect(0, dynamicEvent.y - 4, canvas.width, 8);
                if(bird.y + bird.radius > dynamicEvent.y - 10 && bird.y - bird.radius < dynamicEvent.y + 10) {
                    if (sys.shield > 0 && dynamicEvent.timer === 0) { sys.shield--; bird.velocity = sys.jumpStrength; } 
                    else if(dynamicEvent.timer < -2) { gameOver(); } 
                }
            } else { dynamicEvent.active = false; }
        }

        function updateScoreUI() { 
            document.getElementById('current-score').innerText = Math.floor(score); 
            quests.forEach(q => { if(!q.claimed && q.type === 'totalScore' && stats.totalScore + score >= q.target) {} });
        }

        function checkLevelUp() {
            let levels = [20, 50, 100];
            for (let l of levels) {
                if (score >= l && !hexLevelsTriggered[l]) {
                    hexLevelsTriggered[l] = true;
                    const alert = document.getElementById('theme-alert');
                    alert.innerText = `领域展开：${getCurrentTheme().name}\n海克斯升级！`;
                    alert.style.opacity = 1; setTimeout(() => alert.style.opacity = 0, 2000);
                    triggerHextech(true); break;
                }
            }
        }

        function gameOver() {
            if (gameState === 'GAMEOVER') return;
            gameState = 'GAMEOVER';
            let earned = Math.floor(score * sys.coinMult);
            if (sys.luckyStar && Math.floor(score) % 2 !== 0) earned += 50; 
            myCoins += earned; document.getElementById('coin-amount').innerText = myCoins; document.getElementById('earned-coins').innerText = earned;

            stats.totalScore += Math.floor(score); stats.totalGames += 1;
            scoreHistory.push(Math.floor(score)); scoreHistory.sort((a,b) => b - a); scoreHistory = scoreHistory.slice(0, 5); 
            saveData();
            
            document.getElementById('final-score').innerText = Math.floor(score);
            const lbBox = document.getElementById('leaderboard-box');
            lbBox.innerHTML = '<div style="margin-bottom:8px; font-size:15px; border-bottom:2px solid #a98547; padding-bottom:5px;">🏆 殿堂历史最高</div>';
            scoreHistory.forEach((s, idx) => { lbBox.innerHTML += `<div class="lb-item"><span>TOP ${idx+1}</span><span style="color:#f26d21; font-size:16px;">${s} 分</span></div>`; });

            document.getElementById('current-score').style.display = 'none'; document.getElementById('warning-line').style.opacity = 0;
            setTimeout(() => { document.getElementById('game-over-screen').style.display = 'flex'; }, 300); 
        }

        // --- 商店与任务 ---
        document.getElementById('shop-open-btn').addEventListener('click', (e) => { e.stopPropagation(); document.getElementById('shop-coins').innerText = myCoins; renderShop(); document.getElementById('shop-screen').style.display = 'flex'; });
        document.getElementById('shop-close-btn').addEventListener('click', (e) => { e.stopPropagation(); document.getElementById('shop-screen').style.display = 'none'; });

        function renderShop() {
            const qList = document.getElementById('quest-list'); qList.innerHTML = '';
            quests.forEach(q => {
                let progress = q.type === 'totalScore' ? stats.totalScore : stats.totalGames;
                let isDone = progress >= q.target;
                let btnHtml = q.claimed ? `<button class="shop-btn-sm btn-equipped">已完成</button>` : 
                              isDone ? `<button class="shop-btn-sm btn-claim" onclick="claimQuest('${q.id}', ${q.reward}, event)">领 ${q.reward}🪙</button>` :
                              `<button class="shop-btn-sm" style="background:#543847;">${Math.min(progress, q.target)}/${q.target}</button>`;
                qList.innerHTML += `<div class="shop-item"><div class="item-info"><div class="item-name">${q.desc}</div></div>${btnHtml}</div>`;
            });

            const petList = document.getElementById('pet-list'); petList.innerHTML = '';
            for(let key in PETS) {
                let p = PETS[key]; if (p.cost === -1) continue; 
                let isUnlocked = unlockedPets.includes(key); let isEquipped = currentPet === key;
                let btnHtml = isEquipped ? `<button class="shop-btn-sm btn-equipped">陪伴中</button>` : isUnlocked ? `<button class="shop-btn-sm btn-equip" onclick="equipPet('${key}', event)">携带</button>` : `<button class="shop-btn-sm btn-buy" onclick="buyPet('${key}', ${p.cost}, event)">${p.cost} 🪙</button>`;
                petList.innerHTML += `<div class="shop-item ${isEquipped ? 'active' : ''}"><div class="item-info"><span class="item-name">${p.name}</span><div class="item-desc" style="color:#10b981;">Buff: ${p.buff}</div></div>${btnHtml}</div>`;
            }

            const itemsList = document.getElementById('items-list'); itemsList.innerHTML = '';
            for(let key in ITEMS) {
                let item = ITEMS[key]; let count = myItems[key] || 0;
                itemsList.innerHTML += `<div class="shop-item"><div class="item-info"><div class="item-name">${item.icon} ${item.name} <span style="color:#10b981; font-size:12px;">(拥有:${count})</span></div><div class="item-desc">${item.desc}</div></div><button class="shop-btn-sm btn-buy" onclick="buyItem('${key}', ${item.cost}, event)">${item.cost} 🪙</button></div>`;
            }

            const skinList = document.getElementById('skin-list'); skinList.innerHTML = '';
            for(let key in SKINS) {
                let s = SKINS[key]; if (s.cost === -1) continue; 
                let isUnlocked = unlockedSkins.includes(key); let isEquipped = currentSkin === key;
                let btnHtml = isEquipped ? `<button class="shop-btn-sm btn-equipped">已装备</button>` : isUnlocked ? `<button class="shop-btn-sm btn-equip" onclick="equipSkin('${key}', event)">装备</button>` : `<button class="shop-btn-sm btn-buy" onclick="buySkin('${key}', ${s.cost}, event)">${s.cost} 🪙</button>`;
                skinList.innerHTML += `<div class="shop-item ${isEquipped ? 'active' : ''}"><div class="item-info"><span class="item-name">${s.name}</span><div class="item-desc" style="color:#10b981;">Buff: ${s.buff}</div></div>${btnHtml}</div>`;
            }
        }

        window.claimQuest = function(id, reward, e) { e.stopPropagation(); let q = quests.find(x => x.id === id); if(q && !q.claimed) { q.claimed = true; myCoins += reward; saveData(); document.getElementById('shop-coins').innerText = myCoins; document.getElementById('coin-amount').innerText = myCoins; renderShop(); } };
        window.buyItem = function(key, cost, e) { e.stopPropagation(); if(myCoins >= cost) { myCoins -= cost; myItems[key]++; saveData(); document.getElementById('shop-coins').innerText = myCoins; document.getElementById('coin-amount').innerText = myCoins; renderShop(); } else { alert("金币不足！"); } };
        window.buySkin = function(key, cost, e) { e.stopPropagation(); if(myCoins >= cost) { myCoins -= cost; unlockedSkins.push(key); saveData(); document.getElementById('shop-coins').innerText = myCoins; document.getElementById('coin-amount').innerText = myCoins; renderShop(); } else { alert("金币不足！"); } };
        window.buyPet = function(key, cost, e) { e.stopPropagation(); if(myCoins >= cost) { myCoins -= cost; unlockedPets.push(key); saveData(); document.getElementById('shop-coins').innerText = myCoins; document.getElementById('coin-amount').innerText = myCoins; renderShop(); } else { alert("金币不足！"); } };
        window.equipSkin = function(key, e) { e.stopPropagation(); currentSkin = key; saveData(); renderShop(); drawFrame(); };
        window.equipPet = function(key, e) { e.stopPropagation(); currentPet = key; saveData(); renderShop(); };

        const resetGame = (e, goHome) => {
            e.stopPropagation(); if(e.cancelable) e.preventDefault();
            sys = { gravity: BASE_GRAVITY, jumpStrength: BASE_JUMP, speed: BASE_SPEED, gap: BASE_GAP, scoreMult: 1, shield: 0, coinMult: 1, phoenixProgress: 0, ghostPipes: 0, bounceFloor: false, goldPipes: false, hideBg: false, bombPipes: false, movingPipes: false, fadingPipes: false, coinDropRate: 0.3 };
            bird.radius = BASE_RADIUS; bird.y = canvas.height / 2; bird.velocity = 0; bird.rotation = 0;
            pipes.reset(); score = 0; frames = 0; hexLevelsTriggered = { 20: false, 50: false, 100: false }; petPos = { x: -50, y: -50 };
            
            updateScoreUI(); document.getElementById('current-score').style.display = 'block'; document.getElementById('game-over-screen').style.display = 'none';
            if (goHome) { document.getElementById('start-screen').style.display = 'flex'; document.getElementById('top-bar').style.display = 'flex'; gameState = 'START'; } 
            else { triggerHextech(); }
        };
        document.getElementById('restart-btn').addEventListener('mousedown', (e) => resetGame(e, false));
        document.getElementById('restart-btn').addEventListener('touchstart', (e) => resetGame(e, false), {passive: false});
        document.getElementById('home-btn').addEventListener('mousedown', (e) => resetGame(e, true));
        document.getElementById('home-btn').addEventListener('touchstart', (e) => resetGame(e, true), {passive: false});

        function drawFrame() {
            let theme = getCurrentTheme();
            ctx.fillStyle = sys.hideBg ? '#111' : theme.sky; ctx.fillRect(0,0,canvas.width,canvas.height);
            bg.update(); bg.draw(theme); pipes.draw(theme); drawFloatingCoins(); drawDynamicEvent(); bird.draw();
            if(gameState === 'PLAYING' && currentPet !== 'none') {
                petPos.x += (bird.x - 35 - petPos.x) * 0.1; petPos.y += (bird.y - 15 - petPos.y) * 0.1;
                PETS[currentPet].render(petPos.x, petPos.y, frames);
            }
        }

        function loop() {
            if (gameState !== 'HEXTECH_MID') { drawFrame(); }
            if (gameState === 'PLAYING') { pipes.update(); bird.update(); frames++; } 
            else if (gameState === 'GAMEOVER') { if (bird.y + bird.radius < canvas.height - 100) { bird.velocity += sys.gravity * 1.5; bird.y += bird.velocity; } } 
            else if (gameState === 'START' || gameState === 'HEXTECH') { bird.y = (canvas.height / 2) + Math.sin(frames * 0.05) * 5; frames++; }
            requestAnimationFrame(loop);
        }

        let lastFlapTime = 0;
        function action(e) {
            // UI元素保护层：如果点到按钮或输入框，让给它们自己处理
            if (e.target && (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || (e.target.closest && (e.target.closest('.panel') || e.target.closest('.hex-card'))))) return;
            if (document.getElementById('shop-screen').style.display === 'flex' || document.getElementById('gacha-screen').style.display === 'flex') return;
            
            if (e.type === 'keydown' && e.code !== 'Space') return;
            if (e.cancelable && (e.type === 'touchstart' || e.code === 'Space')) e.preventDefault();
            
            let now = Date.now();
            if (now - lastFlapTime < 50) return; 
            lastFlapTime = now;

            if (gameState === 'START') { triggerHextech(); } else if (gameState === 'PLAYING') { bird.flap(); }
        }

        window.addEventListener('keydown', action);
        container.addEventListener('mousedown', action);
        container.addEventListener('touchstart', action, { passive: false });
        bird.y = canvas.height / 2; loop();
    </script>
</body>
</html>
