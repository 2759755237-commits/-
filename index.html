<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智能猜数仪</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-main: #ffffff;
            --accent: #00ffcc;
            --error: #ff4d4f;
            --warning: #faad14;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        h1 { font-size: 28px; font-weight: 700; margin-bottom: 5px; letter-spacing: 2px; }
        .subtitle { font-size: 14px; color: rgba(255, 255, 255, 0.8); margin-bottom: 30px; }

        .range-display {
            font-size: 20px;
            font-weight: bold;
            color: var(--accent);
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: inline-block;
            letter-spacing: 1px;
        }

        /* 隐藏输入框自带的上下小箭头 */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid transparent;
            padding: 15px;
            border-radius: 12px;
            font-size: 24px;
            text-align: center;
            font-weight: bold;
            color: #333;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 255, 204, 0.4); }

        button {
            width: 100%;
            background: var(--accent);
            color: #111;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 255, 204, 0.4); }
        button:active { transform: translateY(1px); }

        .message {
            font-size: 16px;
            font-weight: 500;
            min-height: 24px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 15px;
        }

        /* 胜利时的动画效果 */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(0, 255, 204, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); }
        }
        .win-anim { animation: pulse 1.5s infinite; border-color: var(--accent); }

        #reset-btn {
            background: transparent;
            color: white;
            border: 1px solid white;
            display: none;
            margin-top: 10px;
        }
        #reset-btn:hover { background: rgba(255,255,255,0.1); box-shadow: none; }

    </style>
</head>
<body>

    <div class="game-card" id="card">
        <h1>智能猜数仪</h1>
        <div class="subtitle">系统已生成一个神秘数字</div>

        <div class="range-display" id="range-display">
            [ 1 - 100 ]
        </div>

        <div class="message" id="message">请输入你的猜测</div>

        <div class="input-group">
            <input type="number" id="guess-input" placeholder="?" inputmode="numeric" autocomplete="off" autofocus>
            <button id="submit-btn" onclick="checkGuess()">确认验证</button>
            <button id="reset-btn" onclick="initGame()">重新开始</button>
        </div>

        <div class="stats">
            <span>当前尝试: <b id="attempts">0</b> 次</span>
            <span>最佳记录: <b id="best-score">--</b> 次</span>
        </div>
    </div>

    <script>
        let targetNumber;
        let minRange;
        let maxRange;
        let attempts;
        let gameActive = true;
        
        // 获取本地存储的最佳记录
        let bestScore = localStorage.getItem('guessNumberBestScore') || '--';
        document.getElementById('best-score').innerText = bestScore;

        const inputEl = document.getElementById('guess-input');
        const messageEl = document.getElementById('message');
        const rangeEl = document.getElementById('range-display');
        const attemptsEl = document.getElementById('attempts');
        const submitBtn = document.getElementById('submit-btn');
        const resetBtn = document.getElementById('reset-btn');
        const cardEl = document.getElementById('card');

        // 初始化游戏
        function initGame() {
            targetNumber = Math.floor(Math.random() * 100) + 1;
            minRange = 1;
            maxRange = 100;
            attempts = 0;
            gameActive = true;

            updateRangeDisplay();
            attemptsEl.innerText = attempts;
            messageEl.innerText = '请输入你的猜测';
            messageEl.style.color = 'var(--text-main)';
            inputEl.value = '';
            inputEl.disabled = false;
            
            submitBtn.style.display = 'block';
            resetBtn.style.display = 'none';
            cardEl.classList.remove('win-anim');
            
            // 延迟一点让手机键盘有时间反应
            setTimeout(() => inputEl.focus(), 100);
        }

        // 核心验证逻辑
        function checkGuess() {
            if (!gameActive) return;

            const userGuess = parseInt(inputEl.value);

            // 基础校验
            if (isNaN(userGuess)) {
                showMessage('请输入有效的数字！', 'var(--warning)');
                return;
            }
            if (userGuess < 1 || userGuess > 100) {
                showMessage('数字超出了 1 到 100 的范围！', 'var(--warning)');
                inputEl.value = '';
                return;
            }

            attempts++;
            attemptsEl.innerText = attempts;

            // 判断逻辑
            if (userGuess === targetNumber) {
                handleWin();
            } else if (userGuess < targetNumber) {
                showMessage(`太小了！目标比 ${userGuess} 大。`, 'var(--warning)');
                if (userGuess > minRange) minRange = userGuess + 1;
                inputEl.value = '';
                inputEl.focus();
            } else {
                showMessage(`太大了！目标比 ${userGuess} 小。`, 'var(--warning)');
                if (userGuess < maxRange) maxRange = userGuess - 1;
                inputEl.value = '';
                inputEl.focus();
            }

            if (gameActive) updateRangeDisplay();
        }

        function showMessage(text, color) {
            messageEl.innerText = text;
            messageEl.style.color = color;
        }

        function updateRangeDisplay() {
            // 如果范围交叉了（理论上不会，以防万一）
            if (minRange > maxRange) return;
            rangeEl.innerText = `[ ${minRange} - ${maxRange} ]`;
        }

        function handleWin() {
            gameActive = false;
            showMessage(`🎉 恭喜你猜对了！答案就是 ${targetNumber}`, 'var(--accent)');
            rangeEl.innerText = `[ 命中目标 ]`;
            inputEl.disabled = true;
            cardEl.classList.add('win-anim');
            
            submitBtn.style.display = 'none';
            resetBtn.style.display = 'block';

            // 更新最佳记录
            if (bestScore === '--' || attempts < parseInt(bestScore)) {
                bestScore = attempts;
                localStorage.setItem('guessNumberBestScore', bestScore);
                document.getElementById('best-score').innerText = bestScore;
                setTimeout(() => alert(`太棒了！你创造了新的最佳记录：${bestScore} 次！`), 300);
            }
        }

        // 监听回车键提交
        inputEl.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault(); // 防止手机端回车刷新页面
                checkGuess();
            }
        });

        // 启动游戏
        initGame();

    </script>
</body>
</html>
